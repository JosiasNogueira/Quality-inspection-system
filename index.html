// Componente de Login
function LoginScreen({onLogin,th}){
  const [nome,setNome]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  
  const handleLogin=async()=>{
    if(nome.trim()===""){
      setError("Digite seu nome completo");
      return;
    }
    
    setLoading(true);
    setError("");
    
    try{
      console.log("Tentando conectar ao Supabase...");
      const {data,error:err}=await supabase
        .from("usuarios_conectados")
        .insert([{nome,timestamp:new Date().toISOString(),computador:navigator.platform}])
        .select();
      
      if(err){
        console.error("Erro no Supabase insert:", err);
        setError(`Erro ao conectar ao servidor: ${err.message || err.details || 'Verifique a tabela e permissões.'}`);
        setLoading(false);
        return;
      }
      
      console.log("Login bem-sucedido:", data);
      onLogin({nome,userId:data[0]?.id});
    }catch(e){
      console.error("Erro de rede/conexão:", e);
      setError("Erro na conexão: Verifique sua internet ou configurações do Supabase.");
      setLoading(false);
    }
  };
  
  return(
    <div style={{position:"fixed",inset:0,background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:5000}}>
      <div style={{width:"100%",maxWidth:420,background:th.surface,borderRadius:16,padding:40,boxShadow:"0 20px 60px rgba(0,0,0,0.5)",border:`1px solid ${th.border}`}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:48,marginBottom:12}}>🔐</div>
          <h1 style={{fontSize:28,fontWeight:900,color:th.text,marginBottom:8}}>BERTHAX SURGICAL LTDA</h1>
          <p style={{fontSize:14,color:th.textMuted,marginBottom:8}}>Sistema de Inspeção de Qualidade</p>
          <p style={{fontSize:13,color:th.textSub}}>Faça login com seu nome e cargo</p>
        </div>
        
        {error&&<div style={{background:"#dc262630",border:"1px solid #dc2626",borderRadius:8,padding:12,marginBottom:16,color:"#dc2626",fontSize:12,fontWeight:600}}>{error}</div>}
        
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:th.text,marginBottom:8}}>Nome Completo</label>
          <input
            type="text"
            placeholder="Seu nome aqui"
            value={nome}
            onChange={(e)=>setNome(e.target.value)}
            onKeyPress={(e)=>e.key==="Enter"&&handleLogin()}
            disabled={loading}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${th.border2}`,background:th.surface2,color:th.text,fontSize:14,fontFamily:"inherit",opacity:loading?0.6:1}}
          />
        </div>
        
        <button
          onClick={handleLogin}
          disabled={loading}
          style={{width:"100%",padding:14,borderRadius:10,border:"none",background:loading?"#999":"linear-gradient(135deg,#F47B20,#FF9A45)",color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"not-allowed":"pointer",boxShadow:"0 4px 12px rgba(244,123,32,0.35)",transition:"all 0.3s",opacity:loading?0.7:1}}
        >
          {loading?"Conectando...":"🔓 Entrar"}
        </button>
      </div>
    </div>
  );
}

// Componente de Usuários Conectados
function UsuariosConectados({usuariosOnline,th}){
  if(usuariosOnline.length===0) return null;
  
  return(
    <div style={{background:th.surface2,border:`1px solid ${th.border}`,borderRadius:10,padding:12,marginBottom:16,marginLeft:20,marginRight:20}}>
      <div style={{fontSize:12,fontWeight:700,color:th.textMuted,marginBottom:8}}>👥 CONECTADOS ({usuariosOnline.length})</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {usuariosOnline.map((u,i)=>(
          <div key={i} className="user-badge" style={{background:th.surface,border:`1px solid ${th.border2}`,color:th.text}}>
            <span className="online-indicator"></span>
            <span>{u.nome}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function exportRelatMensal(mes,ano,osList,lang,emailDest){
  const t=T[lang||"pt"],sev=SEV_LABEL_MAP[lang||"pt"];

  const osDoMes=osList.filter(o=>{const d=new Date(o.createdAt);return d.getMonth()+1===mes&&d.getFullYear()===ano;});
  const totalOS=osDoMes.length;
  const totalItens=osDoMes.reduce((a,o)=>a+(parseInt(o.quantidadeTotal)||0),0);
  const osNC=osDoMes.filter(o=>o.status==="nao_conforme");
  const totalNC=osNC.reduce((a,o)=>a+o.naoConformidades.length,0);

  <style>body{font-family:'Segoe UI',sans-serif;padding:32px;color:#111;font-size:14px;margin:0}

  table{width:100%;border-collapse:collapse;font-size:13px}th{background:#f1f5f9;padding:8px 12px;text-align:left;border:1px solid #e2e8f0;font-size:12px;color:#475569}
  tr:nth-child(even) td{background:#f8fafc}
  .footer{margin-top:40px;border-top:1px solid #e2e8f0;padding-top:16px;display:flex;justify-content:space-between;font-size:11px;color:#888}
  @media print{body{padding:20px}}</style></head><body>
  <div class="hdr"><div><div class="co">BERTHAX SURGICAL LTDA</div><div class="su">${t.appSub}</div>
  <div class="ti">${lang==="en"?"Monthly Report":lang==="es"?"Reporte Mensual":"Relatório Mensal"} – ${nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1)}</div></div>

  ${osNC.length>0?`<div class="sec"><div class="st">${lang==="en"?"Non-Conforming WOs":lang==="es"?"OTs No Conformes":"OS com Não Conformidades"} (${osNC.length})</div>

const initialState={view:"dashboard",osList:[],form:null,filterText:"",filterStatus:"all",filterTecnico:"all",emailModal:null,settingsOpen:false,lang:"pt",theme:"dark",emailPadrao:"",jsonFilename:DEFAULT_FILENAME,autoSave:false,toast:null,relModal:false,relMes:new Date().getMonth()+1,relAno:new Date().getFullYear(),relEmail:"",saveModal:false,savedFileName:null,cloudModal:false,importModal:false,groupByMonth:true,expandedGroups:{},tracker:[],trackerModal:null,externo:[],externoModal:null,trackerTab:"interno",coleta:[],coletaModal:null,confirmMsg:null};

function reducer(state,action){
  switch(action.type){
    case "SET_VIEW":return{...state,view:action.payload==="coleta"?"tracker":action.payload,form:null};
    case "NEW_OS":return{...state,view:"form",form:emptyOS()};
    case "EDIT_OS":return{...state,view:"form",form:JSON.parse(JSON.stringify(action.payload))};
    case "VIEW_OS":return{...state,view:"detail",form:action.payload};
    case "UPDATE_FORM":return{...state,form:{...state.form,...action.payload}};
    case "TOGGLE_OK":{const okSemNC=!state.form.okSemNC;return{...state,form:{...state.form,okSemNC,status:okSemNC?"conforme":"nao_conforme",naoConformidades:okSemNC?[]:state.form.naoConformidades}};}
    case "SAVE_OS":{
      const exists=state.osList.find(o=>o.id===state.form.id);
      const osList=exists?state.osList.map(o=>o.id===state.form.id?state.form:o):[...state.osList,state.form];
      let newTracker=state.tracker;
      if(!exists){
        const tecnicos = Array.isArray(state.form.tecnico)?state.form.tecnico.join(", "):state.form.tecnico||"—";
        const tEntry={
          id:genId(),
          numOs:state.form.os||"",
          cliente:state.form.cliente||"",
          dataEntrada:state.form.dataInspecao||new Date().toISOString().slice(0,10),
          situacao:"finalizada",
          obs:("Inspecao finalizada. Tecnicos: "+tecnicos+". "+(state.form.observacoes||"")).trim(),
          _fromInspecao:true,
        };
        newTracker=[...state.tracker,tEntry];
      }
      return{...state,osList,tracker:newTracker,view:"history",form:null};
    }
    case "DELETE_OS":return{...state,osList:state.osList.filter(o=>o.id!==action.payload)};
    case "SET_FILTER":return{...state,filterText:action.payload};
    case "SET_FILTER_STATUS":return{...state,filterStatus:action.payload};
    case "SET_FILTER_TECNICO":return{...state,filterTecnico:action.payload};
    case "ADD_NC":return{...state,form:{...state.form,naoConformidades:[...state.form.naoConformidades,emptyNC()],status:"nao_conforme",okSemNC:false}};
    case "UPDATE_NC":return{...state,form:{...state.form,naoConformidades:state.form.naoConformidades.map(nc=>nc.id===action.id?{...nc,[action.field]:action.value}:nc)}};
    case "REMOVE_NC":{const ncs=state.form.naoConformidades.filter(nc=>nc.id!==action.id);return{...state,form:{...state.form,naoConformidades:ncs,status:ncs.length===0?"conforme":"nao_conforme"}};}
    case "OPEN_EMAIL":return{...state,emailModal:{os:action.payload,email:state.emailPadrao||""}};
    case "SET_EMAIL":return{...state,emailModal:{...state.emailModal,email:action.payload}};
    case "CLOSE_EMAIL":return{...state,emailModal:null};
    case "TOGGLE_SETTINGS":return{...state,settingsOpen:!state.settingsOpen};
    case "SAVE_SETTINGS":return{...state,lang:action.lang,theme:action.theme,emailPadrao:action.emailPadrao,jsonFilename:action.jsonFilename||DEFAULT_FILENAME,autoSave:action.autoSave,settingsOpen:false};
    case "SHOW_TOAST":return{...state,toast:action.msg};
    case "HIDE_TOAST":return{...state,toast:null};
    case "OPEN_REL":return{...state,relModal:true,relEmail:state.emailPadrao||""};
    case "CLOSE_REL":return{...state,relModal:false};
    case "SET_REL":return{...state,[action.field]:action.value};
    case "OPEN_SAVE_MODAL":return{...state,saveModal:true};
    case "CLOSE_SAVE_MODAL":return{...state,saveModal:false};
    case "SET_SAVED_FILENAME":return{...state,savedFileName:action.payload,saveModal:false};
    case "OPEN_CLOUD_MODAL":return{...state,cloudModal:true};
    case "CLOSE_CLOUD_MODAL":return{...state,cloudModal:false};
    case "OPEN_IMPORT":return{...state,importModal:true};
    case "CLOSE_IMPORT":return{...state,importModal:false};
    case "IMPORT_OS":{
      const existNums=new Set(state.osList.map(o=>o.os));
      const toAdd=action.skipDup?action.payload.filter(o=>!existNums.has(o.os)):action.payload;
      return{...state,osList:[...state.osList,...toAdd],importModal:false,view:"history"};
    }
    case "TOGGLE_GROUP":return{...state,groupByMonth:!state.groupByMonth};
    case "TOGGLE_EXPAND":return{...state,expandedGroups:{...state.expandedGroups,[action.key]:!state.expandedGroups[action.key]}};
    case "EXPAND_ALL":{const eg={};action.keys.forEach(k=>{eg[k]=true;});return{...state,expandedGroups:eg};}
    case "COLLAPSE_ALL":return{...state,expandedGroups:{}};
    case "OPEN_TRACKER_MODAL":return{...state,trackerModal:action.payload||{id:null,cliente:"",dataEntrada:new Date().toISOString().slice(0,10),situacao:"aguardando",obs:""}};
    case "CLOSE_TRACKER_MODAL":return{...state,trackerModal:null};
    case "SAVE_TRACKER":{const ex=state.tracker.find(x=>x.id===action.payload.id);const tracker=ex?state.tracker.map(x=>x.id===action.payload.id?action.payload:x):[...state.tracker,{...action.payload,id:action.payload.id||genId()}];return{...state,tracker,trackerModal:null};}
    case "DELETE_TRACKER":return{...state,tracker:state.tracker.filter(x=>x.id!==action.payload)};
    case "UPDATE_TRACKER_STATUS":return{...state,tracker:state.tracker.map(x=>x.id===action.id?{...x,situacao:action.situacao}:x)};
    case "SET_TRACKER_TAB":return{...state,trackerTab:action.payload};
    case "OPEN_EXTERNO_MODAL":return{...state,externoModal:action.payload||{id:null,cliente:"",numOs:"",tipoServico:"",prestador:"",dataEnvio:new Date().toISOString().slice(0,10),dataRetornoPrev:"",situacao:"aguardando_envio",obs:""}};
    case "CLOSE_EXTERNO_MODAL":return{...state,externoModal:null};
    case "SAVE_EXTERNO":{const ex=state.externo.find(x=>x.id===action.payload.id);const externo=ex?state.externo.map(x=>x.id===action.payload.id?action.payload:x):[...state.externo,{...action.payload,id:action.payload.id||genId()}];return{...state,externo,externoModal:null};}
    case "DELETE_EXTERNO":return{...state,externo:state.externo.filter(x=>x.id!==action.payload)};
    case "UPDATE_EXTERNO_STATUS":return{...state,externo:state.externo.map(x=>x.id===action.id?{...x,situacao:action.situacao,...(action.dataRetorno?{dataRetorno:action.dataRetorno}:{})}:x)};
    case "OPEN_COLETA_MODAL":return{...state,coletaModal:action.payload||{id:null,cliente:"",numOs:"",dataSolicitacao:new Date().toISOString().slice(0,10),dataRetirada:"",status:"pendente",obs:""}};
    case "CLOSE_COLETA_MODAL":return{...state,coletaModal:null};
    case "SAVE_COLETA":{const ex=state.coleta.find(x=>x.id===action.payload.id);const coleta=ex?state.coleta.map(x=>x.id===action.payload.id?action.payload:x):[...state.coleta,{...action.payload,id:action.payload.id||genId()}];return{...state,coleta,coletaModal:null};}
    case "DELETE_COLETA":return{...state,coleta:state.coleta.filter(x=>x.id!==action.payload)};
    case "UPDATE_COLETA_STATUS":return{...state,coleta:state.coleta.map(x=>x.id===action.id?{...x,status:action.status,...(action.dataRetirada?{dataRetirada:action.dataRetirada}:{})}:x)};
    case "LOAD_DATA":return{...state,osList:action.payload.osList||action.payload,tracker:action.payload.tracker||[],externo:action.payload.externo||[],coleta:action.payload.coleta||[]};
    case "SHOW_CONFIRM":return{...state,confirmMsg:action.msg};
    case "HIDE_CONFIRM":return{...state,confirmMsg:null};
    default:return state;
  }
}

        </div>
      </div>
    </div>
  );
}

function DashboardKPI({state,dispatch,th,t,C,fmtDate}){
  const chartRef=useRef(null);
  const chartInstance=useRef(null);
  const total=state.osList.length;
  const conformes=state.osList.filter(o=>o.status==="conforme").length;
  const naoConformes=total-conformes;
  const taxa=total>0?Math.round((conformes/total)*100):0;
  const totalPecas=state.osList.reduce((a,o)=>a+(parseInt(o.quantidadeTotal)||0),0);
  const totalNCs=state.osList.reduce((a,o)=>a+(parseInt(o.totalNaoConformidades)||o.naoConformidades.length),0);

  const monthlyData=React.useMemo(()=>{
    const map={};
    state.osList.forEach(o=>{
      const d=o.dataInspecao?new Date(o.dataInspecao+"T12:00:00"):new Date(o.createdAt);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!map[key])map[key]={total:0,conf:0};
      map[key].total++;if(o.status==="conforme")map[key].conf++;
    });
    const keys=Object.keys(map).sort().slice(-6);
    return{
      labels:keys.map(k=>{const[y,m]=k.split("-");return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString(state.lang==="en"?"en-US":state.lang==="es"?"es-ES":"pt-BR",{month:"short",year:"2-digit"});}),
      conf:keys.map(k=>map[k].conf),
      naoConf:keys.map(k=>map[k].total-map[k].conf),
      taxa:keys.map(k=>map[k].total>0?Math.round((map[k].conf/map[k].total)*100):0),
    };
  },[state.osList,state.lang]);

  const tecnicoRanking=React.useMemo(()=>{
    const map={};

      tecList.forEach(tec=>{
        const tName=tec||"—";
        if(!map[tName])map[tName]={total:0,conf:0,ncs:0};

        map[tName].ncs+=parseInt(o.totalNaoConformidades)||o.naoConformidades.length;

    });
    return Object.entries(map).map(([nome,d])=>({nome,total:d.total,conf:d.conf,taxa:d.total>0?Math.round((d.conf/d.total)*100):0,ncs:d.ncs})).sort((a,b)=>b.taxa-a.taxa).slice(0,5);

          {label:state.lang==="en"?"Non-Compliant":state.lang==="es"?"No Conforme":"Não Conforme",data:monthlyData.naoConf,backgroundColor:"rgba(239,68,68,0.1)",borderColor:"#ef4444",borderWidth:3,pointBackgroundColor:"#ef4444",pointBorderColor:"#fff",pointBorderWidth:2,pointRadius:6,tension:0.4,fill:true},
        ],
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:"top",labels:{usePointStyle:true,padding:20,font:{size:12}}},
          tooltip:{backgroundColor:isDark?"#1e1e1e":"#fff",titleColor:isDark?"#eee":"#111",bodyColor:isDark?"#ccc":"#444",borderColor:isDark?"#3a3a3a":"#e5e7eb",borderWidth:1,cornerRadius:8,callbacks:{footer:(items)=>`Taxa: ${monthlyData.taxa[items[0].dataIndex]}%`}},
        },
        scales:{
          x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11}},border:{color:"transparent"}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11},stepSize:1},border:{color:"transparent"},beginAtZero:true},
        },
      },
    });
    return()=>{if(chartInstance.current)chartInstance.current.destroy();};
  },[monthlyData,state.theme]);

  const kpis=[
    {label:t.totalOS||"Total de OS",value:total,icon:"📋",bg:"rgba(244,123,32,0.08)",color:"#F47B20",border:"rgba(244,123,32,0.25)"},
    {label:t.conformes,value:conformes,icon:"✅",bg:"rgba(34,197,94,0.08)",color:"#22c55e",border:"rgba(34,197,94,0.25)"},
    {label:t.naoConformes,value:naoConformes,icon:"⚠️",bg:"rgba(239,68,68,0.08)",color:"#ef4444",border:"rgba(239,68,68,0.25)"},
    {label:t.totalPecas,value:totalPecas.toLocaleString("pt-BR"),icon:"🔩",bg:"rgba(180,180,180,0.06)",color:"#AAAAAA",border:"rgba(180,180,180,0.2)"},
    {label:t.totalNCs,value:totalNCs,icon:"🚫",bg:"rgba(248,113,113,0.08)",color:"#f87171",border:"rgba(248,113,113,0.2)"},
    {label:t.taxaConf,value:taxa+"%",icon:"📈",bg:taxa>=80?"rgba(34,197,94,0.08)":taxa>=50?"rgba(244,123,32,0.08)":"rgba(239,68,68,0.08)",color:taxa>=80?"#22c55e":taxa>=50?"#F47B20":"#ef4444",border:taxa>=80?"rgba(34,197,94,0.25)":taxa>=50?"rgba(244,123,32,0.25)":"rgba(239,68,68,0.25)"},
  ];

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
        {kpis.map(({label,value,icon,bg,color,border})=>(
          <div key={label} style={{background:bg,borderRadius:14,padding:"18px 20px",border:`1px solid ${border}`,display:"flex",flexDirection:"column",gap:4}}>
            <div style={{fontSize:22,lineHeight:1}}>{icon}</div>
            <div style={{fontSize:28,fontWeight:800,color,letterSpacing:"-0.5px",lineHeight:1.1,marginTop:6}}>{value}</div>
            <div style={{fontSize:11,color:th.textMuted,fontWeight:500,marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{...C,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"center"}}>
          <span style={{fontWeight:700,color:th.text,fontSize:14}}>{t.taxaGeral}</span>
          <span style={{fontWeight:800,color:taxa>=80?"#22c55e":taxa>=50?"#F47B20":"#ef4444",fontSize:22,letterSpacing:"-0.5px"}}>{taxa}%</span>
        </div>
        <div style={{background:th.bg,borderRadius:99,height:10,overflow:"hidden"}}>
          <div style={{width:taxa+"%",height:"100%",background:taxa>=80?"linear-gradient(90deg,#22c55e,#4ade80)":taxa>=50?"linear-gradient(90deg,#F47B20,#fb923c)":"linear-gradient(90deg,#ef4444,#f87171)",borderRadius:99,transition:"width 0.6s cubic-bezier(0.34,1.56,0.64,1)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11,color:th.textMuted}}>
          <span>0%</span><span style={{color:"#d97706"}}>Meta: 80%</span><span>100%</span>
        </div>
      </div>
      <div style={{...C,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <span style={{fontWeight:700,color:th.text,fontSize:14}}>📊 {state.lang==="en"?"Monthly Trend":state.lang==="es"?"Tendencia Mensual":"Tendência Mensal"}</span>
        </div>
        {state.osList.length===0?(
          <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:th.textMuted,fontSize:13}}>{t.nenhumaOS}</div>
        ):(
          <div style={{position:"relative",height:200}}><canvas ref={chartRef}/></div>
        )}
      </div>
      {tecnicoRanking.length>0&&(
        <div style={{...C,marginBottom:20}}>
          <div style={{fontWeight:700,color:th.text,marginBottom:14,fontSize:14}}>🏅 {state.lang==="en"?"Top Technicians":state.lang==="es"?"Top Técnicos":"Top Técnicos"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {tecnicoRanking.map((tec,idx)=>{
              const medal=["🥇","🥈","🥉"][idx]||"";
              const taxaColor=tec.taxa>=80?"#22c55e":tec.taxa>=60?"#F47B20":"#ef4444";
              return(
                <div key={tec.nome} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:th.surface2,border:`1px solid ${th.border2}`}}>
                  <span style={{fontSize:18,flexShrink:0,width:24,textAlign:"center"}}>{medal||`#${idx+1}`}</span>
                  <div style={{flex:1,minWidth:0}}>

                    <div style={{background:th.bg,borderRadius:99,height:4,overflow:"hidden",marginTop:4}}>

                    <span style={{fontSize:13,fontWeight:800,color:taxaColor,minWidth:40,textAlign:"right"}}>{tec.taxa}%</span>
                    <span style={{fontSize:10,color:th.textMuted,background:th.bg,padding:"2px 7px",borderRadius:99,border:`1px solid ${th.border2}`}}>{tec.total} OS</span>
                    {tec.ncs>0&&<span style={{fontSize:10,color:"#f87171",background:"#450a0a",padding:"2px 7px",borderRadius:99}}>{tec.ncs} NC</span>}

      <div style={{...C,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontWeight:700,color:th.text,fontSize:14}}>📊 {state.lang==="en"?"Monthly Report":state.lang==="es"?"Reporte Mensual":"Relatório Mensal"}</div>

function ImportModal({th,t,I,B,state,dispatch}){
  const [rows,setRows]=useState([]);
  const [err,setErr]=useState("");
  const [skip,setSkip]=useState(true);
  const [drag,setDrag]=useState(false);
  const fRef=useRef();

  function parseDate(v){
    if(!v)return"";
    if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10);}
    const s=String(v).trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m)return`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);
    return s;
  }
  function nk(k){return String(k||"").toLowerCase().trim().replace(/[\s_\-]/g,"");}
  function fi(headers,...names){for(const n of names){const i=headers.indexOf(nk(n));if(i>=0)return i;}return -1;}

  function parseSheet(data){
    if(!data||data.length<2){setErr(t.importError);return;}
    const h=data[0].map(nk);
    const cOS=fi(h,"numeroos","os","wo","workorder","numeros","nros","nros","numeroda","num");
    const cCli=fi(h,"cliente","client","customer","empresa");
    const cDt=fi(h,"datainspecao","data","date","datainsp","inspectiondate");
    const cTec=fi(h,"tecnico","technician","tech","responsavel");
    const cQtd=fi(h,"quantidadetotal","qtdtotal","qtd","quantity","totalitens","itens");
    const cNC=fi(h,"totalnaoconformidades","totalnc","nc","naoconformidades","nonconformities","nctotal","totalnonconformidades");
    const cObs=fi(h,"observacoes","observações","obs","notes","notas","remarks");
    const cSt=fi(h,"status","estado","state");
    if(cOS<0){setErr("Coluna 'Numero_OS' não encontrada. Verifique o cabeçalho.");return;}
    const out=[];
    for(let i=1;i<data.length;i++){
      const r=data[i];
      const osNum=String(r[cOS]||"").trim();
      if(!osNum)continue;
      const nc=cNC>=0?parseInt(r[cNC])||0:0;
      const stRaw=cSt>=0?String(r[cSt]||"").toLowerCase():"";
      const status=stRaw.includes("nao")||stRaw.includes("não")||stRaw.includes("non")||nc>0?"nao_conforme":"conforme";
      const dt=cDt>=0?parseDate(r[cDt]):"";
      out.push({id:genId(),os:osNum,cliente:cCli>=0?String(r[cCli]||""):"",tecnico:cTec>=0?String(r[cTec]||""):"",data:dt||new Date().toISOString().slice(0,10),dataInspecao:dt||new Date().toISOString().slice(0,10),quantidadeTotal:cQtd>=0?String(r[cQtd]||""):"",totalNaoConformidades:String(nc||""),observacoes:cObs>=0?String(r[cObs]||""):"",okSemNC:nc===0&&status==="conforme",naoConformidades:[],status,createdAt:dt?new Date(dt+"T12:00:00").getTime()||Date.now():Date.now()});
    }
    if(!out.length){setErr(t.importError);return;}
    setErr("");setRows(out);
  }

  function readFile(file){
    const rd=new FileReader();
    rd.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];parseSheet(XLSX.utils.sheet_to_json(ws,{header:1,defval:""}));}catch{setErr(t.importError);}};
    rd.readAsArrayBuffer(file);
  }

  function dlTemplate(){
    const ws=XLSX.utils.aoa_to_sheet([["Numero_OS","Cliente","Data_Inspecao","Tecnico","Quantidade_Total","Total_Nao_Conformidades","Observacoes","Status"],["OS-001","Cliente Exemplo","2025-03-15","João Silva","100","3","Inspeção rotina","nao_conforme"],["OS-002","Empresa ABC","2025-04-20","Maria Santos","50","0","OK","conforme"]]);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Inspeções");XLSX.writeFile(wb,"berthax_modelo.xlsx");
  }

  function doImport(){
    dispatch({type:"IMPORT_OS",payload:rows,skipDup:skip});
    dispatch({type:"SHOW_TOAST",msg:t.importedOK.replace("{n}",skip?rows.filter(r=>!state.osList.map(o=>o.os).includes(r.os)).length:rows.length)});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20,overflowY:"auto"}}>
      <div style={{background:th.surface,borderRadius:18,padding:28,width:620,maxWidth:"96vw",border:`1px solid ${th.border}`,boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}>
        <div style={{fontSize:17,fontWeight:700,color:th.accent,marginBottom:4}}>{t.importXLSTitle}</div>
        <div style={{fontSize:12,color:th.textMuted,marginBottom:16}}>{t.importXLSInfo}</div>

        <div style={{background:th.surface2,borderRadius:10,padding:14,marginBottom:16,border:`1px solid ${th.border2}`}}>
          <div style={{fontWeight:600,color:th.text,marginBottom:8,fontSize:12}}>{t.importXLSCols}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {["Numero_OS *","Cliente *","Data_Inspecao *","Tecnico","Quantidade_Total","Total_Nao_Conformidades","Observacoes","Status"].map(c=>(
              <span key={c} style={{fontSize:10,background:c.includes("*")?"#0ea5e922":"#1e293b",color:c.includes("*")?"#38bdf8":th.textSub,padding:"2px 8px",borderRadius:99,border:`1px solid ${c.includes("*")?"#38bdf8":th.border2}`,fontFamily:"monospace"}}>{c}</span>
            ))}
          </div>
          <button onClick={dlTemplate} style={{...B("#1e3a5f","#7dd3fc"),fontSize:11,padding:"5px 12px"}}>{t.downloadTemplate}</button>
        </div>

        {rows.length===0&&(
          <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)readFile(f);}}
            onClick={()=>fRef.current&&fRef.current.click()}
            style={{border:`2px dashed ${drag?th.accent:th.border2}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:drag?th.accent+"11":"transparent",marginBottom:14}}>
            <div style={{fontSize:32,marginBottom:6}}>📂</div>
            <div style={{color:drag?th.accent:th.textMuted,fontSize:13}}>{t.importXLSDrop}</div>
            <div style={{fontSize:11,color:th.textMuted,marginTop:4}}>.xlsx · .xls · .csv</div>
          </div>
        )}
        <input ref={fRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f);e.target.value="";}}/>

        {err&&<div style={{color:"#f87171",background:"#450a0a",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12}}>{err}</div>}

        {rows.length>0&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontWeight:600,color:th.text,fontSize:13}}>{t.importXLSPreview}: <span style={{color:th.accent}}>{rows.length} OS</span></span>
              <button onClick={()=>{setRows([]);setErr("");}} style={{...B(th.surface2,th.textMuted),fontSize:11,padding:"3px 10px"}}>✕ Limpar</button>
            </div>
            <div style={{maxHeight:200,overflowY:"auto",borderRadius:10,border:`1px solid ${th.border2}`,marginBottom:12}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{background:th.surface2,position:"sticky",top:0}}>
                    {["OS","Cliente","Data","Técnico","Qtd","NC","Status"].map(h=>(
                      <th key={h} style={{padding:"6px 8px",textAlign:"left",color:th.textMuted,fontWeight:600,borderBottom:`1px solid ${th.border2}`,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={i} style={{borderBottom:`1px solid ${th.border}`,background:i%2===0?th.surface:th.surface2}}>
                      <td style={{padding:"6px 8px",color:th.accent,fontWeight:600}}>{r.os}</td>
                      <td style={{padding:"6px 8px",color:th.text,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.cliente||"—"}</td>
                      <td style={{padding:"6px 8px",color:th.textSub,whiteSpace:"nowrap"}}>{r.dataInspecao||"—"}</td>
                      <td style={{padding:"6px 8px",color:th.textSub,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.tecnico||"—"}</td>
