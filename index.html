function AppWrapper(){
  const [user,setUser]=useState(null);
  const [usuariosOnline,setUsuariosOnline]=useState([]);
  
  // Temas (já estão definidos abaixo, vou usar a cópia)
  const THEMES_LOCAL={
    dark:{bg:"#1A1A1A",surface:"#242424",surface2:"#2E2E2E",border:"#3A3A3A",border2:"#484848",text:"#F5F5F5",textMuted:"#888888",textSub:"#AAAAAA",accent:"#F47B20",accentBtn:"#F47B20",header:"linear-gradient(135deg,#2E2E2E 0%,#1A1A1A 100%)"},
    light:{bg:"#F5F5F5",surface:"#FFFFFF",surface2:"#F0F0F0",border:"#E0E0E0",border2:"#CCCCCC",text:"#1A1A1A",textMuted:"#888888",textSub:"#555555",accent:"#F47B20",accentBtn:"#F47B20",header:"linear-gradient(135deg,#2E2E2E 0%,#1A1A1A 100%)"},
  };
  
  const thLogin=THEMES_LOCAL.dark;
  
  // Carregar usuários conectados quando user fizer login
  useEffect(()=>{
    if(!user) return;
    
    const carregarUsuarios=async()=>{
      const {data}=await supabase
        .from("usuarios_conectados")
        .select("*")
        .order("timestamp",{ascending:false})
        .limit(50);
      
      if(data){
        const agora=new Date();
        const usuariosValidos=data.filter(u=>{
          const loginTime=new Date(u.timestamp);
          const diff=(agora-loginTime)/1000/60;
          return diff<30;
        });
        setUsuariosOnline(usuariosValidos);
      }
    };
    
    carregarUsuarios();
    const interval=setInterval(carregarUsuarios,10000);
    
    const subscription=supabase
      .channel("usuarios")
      .on("postgres_changes",{event:"*",schema:"public",table:"usuarios_conectados"},(payload)=>{
        carregarUsuarios();
      })
      .subscribe();
    
    return ()=>{
      clearInterval(interval);
      subscription.unsubscribe();
    };
  },[user]);
  
  if(!user){
    return <LoginScreen onLogin={(userData)=>setUser(userData)} th={thLogin}/>;
  }
  
  const handleLogoutClick=async()=>{
    if(user.userId){
      await supabase.from("usuarios_conectados").delete().eq("id",user.userId).catch(()=>{});
    }
    setUser(null);
  };
  
  return(
    <>
      <AppOriginal user={user} onLogout={handleLogoutClick} usuariosOnline={usuariosOnline}/>
    </>
  );
}

function AppOriginal({user,onLogout,usuariosOnline}){

  const [state,dispatch]=useReducer(reducer,initialState);
  const [tmpLang,setTmpLang]=useState("pt");
  const [tmpTheme,setTmpTheme]=useState("dark");
  const [tmpEmail,setTmpEmail]=useState("");
  const [tmpFilename,setTmpFilename]=useState(DEFAULT_FILENAME);
  const [tmpAutoSave,setTmpAutoSave]=useState(false);
  const [autoLoadBanner,setAutoLoadBanner]=useState(null); // null | "loading" | "ready" | "done" | "error" | "no_handle"
  const [availableTecnicos,setAvailableTecnicos]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem('berthax_tecnicos')||'null');
      if(Array.isArray(saved)&&saved.length>0)return saved;
    }catch(e){ }
    return [...TECHNICOS];
  });
  const [novoTecnico,setNovoTecnico]=useState("");
  const fileRefs=useRef({});
  const confirmCallbackRef=useRef(null);
  function showConfirm(msg,onConfirm){confirmCallbackRef.current=onConfirm;dispatch({type:"SHOW_CONFIRM",msg});}

  const importRef=useRef();
  const th=THEMES[state.theme],t=T[state.lang],sev=SEV_LABEL_MAP[state.lang];

  useEffect(()=>{
    try{localStorage.setItem('berthax_tecnicos',JSON.stringify(availableTecnicos));}catch(e){}
  },[availableTecnicos]);

  // ── File System Access API handle (persisted across sessions via IndexedDB) ──
  const fsHandleRef=useRef(null);
  const FS_SUPPORTED=typeof window!=="undefined"&&"showSaveFilePicker" in window;
  const IDB_KEY="berthax_fs_handle";
  const LS_DATA_KEY="berthax_data_v1";
  const LS_FNAME_KEY="berthax_fname";

  // ── Persist data to localStorage on every change ──
  useEffect(()=>{
    try{
      const payload={osList:state.osList,tracker:state.tracker,externo:state.externo,coleta:state.coleta};
      localStorage.setItem(LS_DATA_KEY,JSON.stringify(payload));
    }catch(e){}
  },[state.osList,state.tracker,state.externo]);

  // ── On first load: try auto-load from FS handle, fallback to localStorage ──
  useEffect(()=>{
    initApp();
  },[]);

  async function initApp(){
    // Always restore fname label first
    try{
      const fname=localStorage.getItem(LS_FNAME_KEY);
      if(fname)dispatch({type:"SET_SAVED_FILENAME",payload:fname});
    }catch(e){}

    if(!FS_SUPPORTED){
      // No FS API — just restore from localStorage silently
      loadFromLocalStorage(true);
      return;
    }

    // Try to get the stored handle from IndexedDB
    const handle=await getHandleFromIDB();
    if(!handle){
      // No previous file linked — load from localStorage silently
      loadFromLocalStorage(true);
      setAutoLoadBanner("no_handle");
      setTimeout(()=>setAutoLoadBanner(null),4000);
      return;
    }

    fsHandleRef.current=handle;

    // Check if permission is already granted (same Chrome session)
    try{
      const perm=await handle.queryPermission({mode:"readwrite"});
      if(perm==="granted"){
        // Auto-load directly — no user gesture needed!
        await doAutoLoad(handle);
        return;
      }
    }catch(e){}

    // Permission not granted yet — show banner asking 1 click
    const fname=handle.name||localStorage.getItem(LS_FNAME_KEY)||"arquivo";
    loadFromLocalStorage(false); // show localStorage data while waiting
    setAutoLoadBanner({state:"ready",fname});
  }

  function loadFromLocalStorage(silent){
    try{
      const raw=localStorage.getItem(LS_DATA_KEY);
      if(raw){
        const p=JSON.parse(raw);
        if(p&&(p.osList||p.tracker||p.externo)){
          dispatch({type:"LOAD_DATA",payload:{osList:p.osList||[],tracker:p.tracker||[],externo:p.externo||[]}});
          if(!silent)dispatch({type:"SHOW_TOAST",msg:"📋 Dados do navegador carregados"});
        }
      }
    }catch(e){}
  }

  async function doAutoLoad(handle){
    setAutoLoadBanner({state:"loading",fname:handle.name});
    try{
      const file=await handle.getFile();
      const text=await file.text();
      const p=JSON.parse(text);
      dispatch({type:"LOAD_DATA",payload:{osList:p.osList||p,tracker:p.tracker||[],externo:p.externo||[]}});
      const fname=handle.name.replace(/\.json$/i,"");
      dispatch({type:"SET_SAVED_FILENAME",payload:fname});
      localStorage.setItem(LS_FNAME_KEY,fname);
      setAutoLoadBanner({state:"done",fname:handle.name});
      setTimeout(()=>setAutoLoadBanner(null),3000);
    }catch(e){
      loadFromLocalStorage(false);
      setAutoLoadBanner({state:"error",fname:handle.name});
      setTimeout(()=>setAutoLoadBanner(null),5000);
    }
  }

  // Called when user clicks the banner button
  async function bannerLoad(){
    if(!fsHandleRef.current)return;
    try{
      const perm=await fsHandleRef.current.requestPermission({mode:"readwrite"});
      if(perm==="granted"){
        await doAutoLoad(fsHandleRef.current);
      } else {
        loadFromLocalStorage(false);
        setAutoLoadBanner(null);
      }
    }catch(e){
      loadFromLocalStorage(false);
      setAutoLoadBanner(null);
    }
  }

  // ── IndexedDB helpers ──
  function openIDB(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open("berthax_db",1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore("handles");
      req.onsuccess=e=>res(e.target.result);
      req.onerror=()=>rej();
    });
  }
  async function saveHandleToIDB(handle){
    try{
      const db=await openIDB();
      const tx=db.transaction("handles","readwrite");
      tx.objectStore("handles").put(handle,IDB_KEY);
    }catch(e){}
  }
  async function getHandleFromIDB(){
    try{
      const db=await openIDB();
      return await new Promise((res)=>{
        const tx=db.transaction("handles","readonly");
        const req=tx.objectStore("handles").get(IDB_KEY);
        req.onsuccess=e=>res(e.target.result||null);
        req.onerror=()=>res(null);
      });
    }catch(e){return null;}
  }
  // keep old name for compatibility
  async function restoreHandleFromIDB(){return await getHandleFromIDB();}
  async function requestHandlePermission(){
    if(!fsHandleRef.current)return false;
    try{
      const perm=await fsHandleRef.current.queryPermission({mode:"readwrite"});
      if(perm==="granted")return true;
      const req=await fsHandleRef.current.requestPermission({mode:"readwrite"});
      return req==="granted";
    }catch(e){return false;}
  }

  // ── Get JSON data ──
  function getJSONData(){
    return JSON.stringify({version:"1.0",exportedAt:new Date().toISOString(),osList:state.osList,tracker:state.tracker,externo:state.externo},null,2);
  }
  function getJSONBlob(){return new Blob([getJSONData()],{type:"application/json"});}

  // ── Save via File System Access API (real overwrite at chosen path) ──
  async function saveViaFSAPI(){
    let handle=fsHandleRef.current;
    // If no handle yet, ask user to pick location
    if(!handle){
      try{
        handle=await window.showSaveFilePicker({
          suggestedName:(state.jsonFilename||DEFAULT_FILENAME)+".json",
          types:[{description:"JSON",accept:{"application/json":[".json"]}}],
        });
        fsHandleRef.current=handle;
        await saveHandleToIDB(handle);
        const fname=handle.name.replace(/\.json$/i,"");
        dispatch({type:"SET_SAVED_FILENAME",payload:fname});
        localStorage.setItem(LS_FNAME_KEY,fname);
      }catch(e){
        if(e.name!=="AbortError")dispatch({type:"SHOW_TOAST",msg:"❌ Erro ao escolher arquivo."});
        return false;
      }
    } else {
      // Ensure we still have permission
      const ok=await requestHandlePermission();
      if(!ok){
        // Permission denied – ask again
        try{
          handle=await window.showSaveFilePicker({
            suggestedName:(state.savedFileName||state.jsonFilename||DEFAULT_FILENAME)+".json",
            types:[{description:"JSON",accept:{"application/json":[".json"]}}],
          });
          fsHandleRef.current=handle;
          await saveHandleToIDB(handle);
          const fname=handle.name.replace(/\.json$/i,"");
          dispatch({type:"SET_SAVED_FILENAME",payload:fname});
          localStorage.setItem(LS_FNAME_KEY,fname);
        }catch(e){
          if(e.name!=="AbortError")dispatch({type:"SHOW_TOAST",msg:"❌ Sem permissão para salvar."});
          return false;
        }
      }
    }
    try{
      const writable=await fsHandleRef.current.createWritable();
      await writable.write(getJSONData());
      await writable.close();
      return true;
    }catch(e){
      dispatch({type:"SHOW_TOAST",msg:"❌ Erro ao gravar arquivo."});
      return false;
    }
  }

  // ── Open via File System Access API (real path picker) ──
  async function openViaFSAPI(){
    try{
      const [handle]=await window.showOpenFilePicker({
        types:[{description:"JSON",accept:{"application/json":[".json"]}}],
      });
      fsHandleRef.current=handle;
      await saveHandleToIDB(handle);
      const fname=handle.name.replace(/\.json$/i,"");
      dispatch({type:"SET_SAVED_FILENAME",payload:fname});
      localStorage.setItem(LS_FNAME_KEY,fname);
      const file=await handle.getFile();
      const text=await file.text();
      const p=JSON.parse(text);
      dispatch({type:"LOAD_DATA",payload:{osList:p.osList||p,tracker:p.tracker||[],externo:p.externo||[]}});
      dispatch({type:"SHOW_TOAST",msg:"✅ "+fname+".json carregado!"});
    }catch(e){
      if(e.name!=="AbortError")dispatch({type:"SHOW_TOAST",msg:t.loadError});
    }
  }

  // ── Main save entry point ──
  async function saveJSON(silent){
    if(state.osList.length===0&&!silent){dispatch({type:"SHOW_TOAST",msg:t.noData});return;}
    if(FS_SUPPORTED){
      const ok=await saveViaFSAPI();
      if(ok&&!silent){
        const fname=fsHandleRef.current?fsHandleRef.current.name:(state.savedFileName||DEFAULT_FILENAME)+".json";
        dispatch({type:"SHOW_TOAST",msg:"💾 "+fname+" salvo!"});
      }
    } else {
      // Fallback: download
      if(state.savedFileName){
        saveJSONDownload(state.savedFileName);
        if(!silent)dispatch({type:"SHOW_TOAST",msg:"💾 "+state.savedFileName+".json baixado!"});
      } else {
        dispatch({type:"OPEN_SAVE_MODAL"});
      }
    }
  }

  // ── Fallback: classic download ──
  function saveJSONDownload(fname){
    const blob=getJSONBlob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=(fname||DEFAULT_FILENAME)+".json";a.click();URL.revokeObjectURL(url);
  }
  function saveJSONToLocal(fname){saveJSONDownload(fname);}

  // ── confirmLocalSave (used by SaveModal fallback) ──
  function confirmLocalSave(fname){
    const finalName=fname||(state.jsonFilename||DEFAULT_FILENAME);
    dispatch({type:"SET_SAVED_FILENAME",payload:finalName});
    localStorage.setItem(LS_FNAME_KEY,finalName);
    saveJSONDownload(finalName);
    dispatch({type:"SHOW_TOAST",msg:"✅ "+finalName+".json "+(state.lang==="en"?"saved!":state.lang==="es"?"guardado!":"salvo!")});
  }

  function saveToGoogleDrive(){
    saveJSONDownload(state.savedFileName||state.jsonFilename||DEFAULT_FILENAME);
    setTimeout(()=>{window.open("https://drive.google.com/drive/my-drive","_blank");},800);
    dispatch({type:"CLOSE_CLOUD_MODAL"});
    dispatch({type:"SHOW_TOAST",msg:"☁️ "+(state.lang==="en"?"Opening Google Drive...":state.lang==="es"?"Abriendo Google Drive...":"Abrindo Google Drive...")});
  }
  function saveToOneDrive(){
    saveJSONDownload(state.savedFileName||state.jsonFilename||DEFAULT_FILENAME);
    setTimeout(()=>{window.open("https://onedrive.live.com","_blank");},800);
    dispatch({type:"CLOSE_CLOUD_MODAL"});
    dispatch({type:"SHOW_TOAST",msg:"☁️ "+(state.lang==="en"?"Opening OneDrive...":state.lang==="es"?"Abriendo OneDrive...":"Abrindo OneDrive...")});
  }

  // ── Load JSON (classic file input fallback) ──
  function loadJSON(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.osList||Array.isArray(p)){dispatch({type:"LOAD_DATA",payload:{osList:p.osList||p,tracker:p.tracker||[],externo:p.externo||[],coleta:p.coleta||[]}});dispatch({type:"SHOW_TOAST",msg:t.loadedOK});}else throw 0;}catch{dispatch({type:"SHOW_TOAST",msg:t.loadError});}};
    r.readAsText(file);e.target.value="";
  }

  // ── Auto-save when data changes (if enabled + FS handle available) ──
  useEffect(()=>{
    if(!state.autoSave)return;
    if(FS_SUPPORTED&&fsHandleRef.current){
      saveViaFSAPI();
    } else if(state.savedFileName){
      saveJSONDownload(state.savedFileName);
    }
  },[state.osList,state.tracker,state.externo,state.coleta]);

  useEffect(()=>{if(state.toast){const tm=setTimeout(()=>dispatch({type:"HIDE_TOAST"}),3000);return()=>clearTimeout(tm);}},[state.toast]);

  function sendEmail(){
    const{os,email}=state.emailModal;if(!email)return;
    exportPDF(os,state.lang);
    const subj=encodeURIComponent(`Relatório OS #${os.os} | Berthax Surgical LTDA`);
    const body=encodeURIComponent(`OS #${os.os}\n${t.cliente}: ${os.cliente||"—"}\n${t.tecnico}: ${os.tecnico||"—"}\n\nBerthax Surgical LTDA`);
    setTimeout(()=>{window.location.href=`mailto:${email}?subject=${subj}&body=${body}`;},800);
    dispatch({type:"CLOSE_EMAIL"});
  }
  function handleFoto(ncId,e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>dispatch({type:"UPDATE_NC",id:ncId,field:"foto",value:ev.target.result});r.readAsDataURL(file);}
  function handleRelatorio(){exportRelatMensal(state.relMes,state.relAno,state.osList,state.lang,state.relEmail||null);dispatch({type:"CLOSE_REL"});dispatch({type:"SHOW_TOAST",msg:"📊 Relatório gerado!"});}

  const I=(extra)=>({padding:"10px 14px",borderRadius:10,border:`1px solid ${th.border2}`,background:th.surface2,color:th.text,fontSize:14,width:"100%",boxSizing:"border-box",fontFamily:"'Inter','Segoe UI',sans-serif",...(extra||{})});
  const L={fontSize:12,fontWeight:600,color:th.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"};
  const C={background:th.surface,borderRadius:16,padding:20,border:`1px solid ${th.border}`};
  const B=(bg,color,extra)=>({padding:"8px 16px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:bg,color,fontFamily:"'Inter','Segoe UI',sans-serif",...(extra||{})});
  const hc="#ffffff";
  const filtered=state.osList.filter(o=>{
    const textMatch=[o.os,o.cliente,o.tecnico].some(v=>String(v||"").toLowerCase().includes(state.filterText.toLowerCase()));
    const statusMatch=(state.filterStatus==="all"||o.status===state.filterStatus);
    const tecnicoMatch=(state.filterTecnico==="all")||(
      Array.isArray(o.tecnico)?o.tecnico.includes(state.filterTecnico):String(o.tecnico||"")===state.filterTecnico
    );
    return textMatch&&statusMatch&&tecnicoMatch;
  });
  const total=state.osList.length,conformes=state.osList.filter(o=>o.status==="conforme").length,taxa=total>0?Math.round((conformes/total)*100):0;
  const totalPecasInsp=state.osList.reduce((a,o)=>a+(parseInt(o.quantidadeTotal)||0),0);
  const totalNCsGeral=state.osList.reduce((a,o)=>a+(parseInt(o.totalNaoConformidades)||o.naoConformidades.length),0);

  return(
  <div style={{minHeight:"100vh",background:th.bg,color:th.text,fontFamily:"'Inter','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#1E2038 0%,#0D0F1C 100%)",borderBottom:`1px solid #2D2F4A`,padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:0,flexShrink:0}}>
          {/* Berthax logo mark — orange square + grey triangle */}
          <div style={{width:38,height:38,background:"#F47B20",borderRadius:"6px 0 0 6px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <polygon points="11,2 20,20 2,20" fill="#2E2E2E" opacity="0.9"/>
              <polygon points="11,7 17,19 5,19" fill="#fff" opacity="0.25"/>
            </svg>
          </div>
          <div style={{background:"#2E2E2E",borderRadius:"0 6px 6px 0",padding:"0 10px",height:38,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:"#fff",letterSpacing:1.5,lineHeight:1}}>BERTHAX</div>
            <div style={{fontSize:8,fontWeight:600,color:"rgba(255,255,255,0.5)",letterSpacing:1,lineHeight:1,marginTop:2}}>SURGICAL LTDA</div>
          </div>
        </div>
        <div style={{width:1,height:28,background:"rgba(255,255,255,0.12)"}}/>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:500}}>{t.appSub}</div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {["dashboard","history","tracker"].map(v=>(
          <button key={v} onClick={()=>dispatch({type:"SET_VIEW",payload:v})}
            style={{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'Inter','Segoe UI',sans-serif",
              background:state.view===v?"linear-gradient(135deg,#F47B20,#FF9A45)":"rgba(255,255,255,0.07)",
              color:state.view===v?"#fff":"rgba(255,255,255,0.5)",
              transition:"all 0.15s",
              boxShadow:state.view===v?"0 2px 12px rgba(244,123,32,0.4)":"none"}}>
            {v==="dashboard"?t.dashboard:v==="history"?t.history:v==="tracker"?"🔧 Acompanhamento":"📦 Coleta"}
          </button>
        ))}
        <div style={{width:1,height:24,background:"rgba(255,255,255,0.1)",margin:"0 2px"}}/>
        <button onClick={()=>dispatch({type:"NEW_OS"})} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Inter','Segoe UI',sans-serif",background:"linear-gradient(135deg,#F47B20,#FF9A45)",color:"#fff",boxShadow:"0 2px 12px rgba(244,123,32,0.4)"}}>{t.newOS}</button>
        <button onClick={()=>dispatch({type:"OPEN_IMPORT"})} title={t.importXLS} style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,background:"rgba(244,123,32,0.15)",color:"#F47B20"}}>📊</button>
        <button onClick={()=>saveJSON(false)} title={state.savedFileName?`Sobrescrever: ${state.savedFileName}.json`:t.saveJSON} style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,background:state.savedFileName?"rgba(52,211,153,0.15)":"rgba(52,211,153,0.1)",color:"#34d399"}}>{state.savedFileName?"💾✔":"💾"}</button>
        <button onClick={()=>dispatch({type:"OPEN_CLOUD_MODAL"})} title="Salvar na Nuvem" style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.5)"}}>☁️</button>
        <button onClick={()=>FS_SUPPORTED?openViaFSAPI():importRef.current&&importRef.current.click()} title={t.loadJSON} style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.5)"}}>📂</button>
        <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={loadJSON}/>
        <button onClick={()=>{setTmpLang(state.lang);setTmpTheme(state.theme);setTmpEmail(state.emailPadrao);setTmpFilename(state.jsonFilename);setTmpAutoSave(state.autoSave);dispatch({type:"TOGGLE_SETTINGS"});}}
          style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:15,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)"}}>⚙️</button>
        <div style={{width:1,height:24,background:"rgba(255,255,255,0.1)",margin:"0 2px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"rgba(255,255,255,0.7)"}}>
          <span>{user.nome}</span>
          <span style={{color:"rgba(255,255,255,0.3)"}}>|</span>
          <span>{user.cargo}</span>
        </div>
        <button onClick={onLogout} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #dc2626",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Inter','Segoe UI',sans-serif",background:"rgba(220,38,38,0.1)",color:"#f87171",transition:"all 0.15s"}}>🔓 Sair</button>
      </div>
    </div>

    {/* ── AUTO-LOAD BANNER ── */}
    {autoLoadBanner&&autoLoadBanner.state==="ready"&&(
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f2b4a)",borderBottom:`2px solid ${th.accent}`,padding:"12px 24px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <span style={{fontSize:20}}>📂</span>
        <div style={{flex:1,minWidth:180}}>
          <div style={{fontWeight:700,color:"#e2e8f0",fontSize:13}}>Arquivo vinculado encontrado</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>
            <span style={{color:th.accent,fontFamily:"monospace"}}>{autoLoadBanner.fname}</span>
            {" "}— clique para carregar agora
          </div>
        </div>
        <button onClick={bannerLoad}
          style={{padding:"9px 22px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#0ea5e9,#38bdf8)",color:"#0f172a",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
          📂 Carregar arquivo
        </button>
        <button onClick={()=>{loadFromLocalStorage(false);setAutoLoadBanner(null);}}
          style={{padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"transparent",color:"#64748b",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
          Usar dados do navegador
        </button>
      </div>
    )}
    {autoLoadBanner&&autoLoadBanner.state==="loading"&&(
      <div style={{background:"#1e3a5f",borderBottom:`1px solid ${th.accent}`,padding:"10px 24px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16,animation:"spin 1s linear infinite"}}>⏳</span>
        <span style={{color:"#93c5fd",fontSize:13}}>Carregando <span style={{fontFamily:"monospace",color:th.accent}}>{autoLoadBanner.fname}</span>...</span>
      </div>
    )}
    {autoLoadBanner&&autoLoadBanner.state==="done"&&(
      <div style={{background:"#14532d",borderBottom:"1px solid #22c55e",padding:"10px 24px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>✅</span>
        <span style={{color:"#86efac",fontSize:13,fontWeight:600}}><span style={{fontFamily:"monospace"}}>{autoLoadBanner.fname}</span> carregado automaticamente!</span>
      </div>
    )}
    {autoLoadBanner&&autoLoadBanner.state==="error"&&(
      <div style={{background:"#450a0a",borderBottom:"1px solid #dc2626",padding:"10px 24px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{color:"#fca5a5",fontSize:13}}>Não foi possível ler <span style={{fontFamily:"monospace"}}>{autoLoadBanner.fname}</span> — usando dados do navegador</span>
      </div>
    )}

    {/* ── SAVE STATUS BAR ── */}
    <div style={{background:state.theme==="dark"?"#1A1A1A":"#EBEBEB",borderBottom:`1px solid ${state.theme==="dark"?"#333":"#D0D0D0"}`,padding:"5px 24px",display:"flex",alignItems:"center",gap:8,fontSize:11,flexWrap:"wrap"}}>
      {FS_SUPPORTED?(
        state.savedFileName?(
          <>
            <span style={{color:"#34d399",fontWeight:600}}>💾 Auto-save ativo</span>
            <span style={{color:"#3A3D60"}}>·</span>
            <span style={{color:"#6B6F9A",fontFamily:"monospace"}}>{state.savedFileName}.json</span>
            <button onClick={async()=>{
              try{
                const handle=await window.showSaveFilePicker({suggestedName:(state.savedFileName||DEFAULT_FILENAME)+".json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
                fsHandleRef.current=handle;
                await saveHandleToIDB(handle);
                const fname=handle.name.replace(/\.json$/i,"");
                dispatch({type:"SET_SAVED_FILENAME",payload:fname});
                localStorage.setItem(LS_FNAME_KEY,fname);
                const writable=await handle.createWritable();
                await writable.write(getJSONData());
                await writable.close();
                dispatch({type:"SHOW_TOAST",msg:"📁 Local alterado: "+fname+".json"});
              }catch(e){}
            }} style={{marginLeft:"auto",fontSize:10,padding:"2px 8px",borderRadius:6,border:"1px solid #3A3D60",background:"transparent",color:"#6B6F9A",cursor:"pointer"}}>📁 Alterar local</button>
          </>
        ):(
          <>
            <span style={{color:"#F5A623",fontWeight:600}}>⚠️ Não vinculado</span>
            <span style={{color:"#3A3D60"}}>· Dados no navegador · Clique 💾 para escolher local</span>
          </>
        )
      ):(
        state.savedFileName?(
          <><span style={{color:"#A78BFA",fontWeight:600}}>📥 Modo download</span><span style={{color:"#3A3D60"}}>·</span><span style={{color:"#6B6F9A",fontFamily:"monospace"}}>{state.savedFileName}.json</span></>
        ):(
          <><span style={{color:"#F5A623",fontWeight:600}}>⚠️ Não vinculado</span><span style={{color:"#3A3D60"}}>· Clique 💾 para salvar</span></>
        )
      )}
    </div>

    <div style={{padding:"24px",maxWidth:1100,margin:"0 auto",flex:1,width:"100%",boxSizing:"border-box"}}>

      {/* DASHBOARD */}
      {state.view==="dashboard"&&(
        <DashboardKPI state={state} dispatch={dispatch} th={th} t={t} C={C} fmtDate={fmtDate}/>
      )}

      {/* HISTORY */}
      {state.view==="history"&&(()=>{
        const sorted=[...filtered].sort((a,b)=>b.createdAt-a.createdAt);
        // Build month groups
        const gMap={};const gKeys=[];
        sorted.forEach(o=>{
          const d=o.dataInspecao?new Date(o.dataInspecao+"T12:00:00"):new Date(o.createdAt);
          const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
          if(!gMap[k]){gMap[k]=[];gKeys.push(k);}
          gMap[k].push(o);
        });
        gKeys.sort((a,b)=>b.localeCompare(a));
        // Year grouping
        const yMap={};
        gKeys.forEach(k=>{const y=k.split("-")[0];if(!yMap[y])yMap[y]=[];yMap[y].push(k);});
        const years=Object.keys(yMap).sort((a,b)=>b-a);
        return(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder={t.search} value={state.filterText} onChange={e=>dispatch({type:"SET_FILTER",payload:e.target.value})} style={{...I(),flex:1,minWidth:160}}/>
              <select value={state.filterStatus} onChange={e=>dispatch({type:"SET_FILTER_STATUS",payload:e.target.value})} style={{...I(),width:"auto"}}>
                <option value="all">{t.all}</option><option value="conforme">{t.conforme}</option><option value="nao_conforme">{t.naoConforme}</option>
              </select>
              <select value={state.filterTecnico} onChange={e=>dispatch({type:"SET_FILTER_TECNICO",payload:e.target.value})} style={{...I(),width:"auto"}}>
                <option value="all">Todos Técnicos</option>
                {availableTecnicos.map(tn=><option key={tn} value={tn}>{tn}</option>)}
              </select>
              <button onClick={()=>{dispatch({type:"SET_FILTER",payload:""});dispatch({type:"SET_FILTER_STATUS",payload:"all"});dispatch({type:"SET_FILTER_TECNICO",payload:"all"});}}
                style={{...B("#f1f5f9","#1f2937"),border:`1px solid ${th.border2}`,whiteSpace:"nowrap",fontSize:12}}>
                Limpar filtros
              </button>
              <button onClick={()=>dispatch({type:"TOGGLE_GROUP"})}
                style={{...B(state.groupByMonth?th.accent:th.surface2,state.groupByMonth?(state.theme==="dark"?"#0f172a":"#fff"):th.textSub),border:`1px solid ${state.groupByMonth?th.accent:th.border2}`,whiteSpace:"nowrap",fontSize:12}}>
                📅 {t.groupByMonth}
              </button>
              {state.groupByMonth&&gKeys.length>0&&(
                <>
                  <button onClick={()=>dispatch({type:"EXPAND_ALL",keys:gKeys})} style={{...B("#1e3a5f","#7dd3fc"),fontSize:11,padding:"6px 10px",whiteSpace:"nowrap"}}>{t.expandAll}</button>
                  <button onClick={()=>dispatch({type:"COLLAPSE_ALL"})} style={{...B(th.surface2,th.textMuted),border:`1px solid ${th.border2}`,fontSize:11,padding:"6px 10px",whiteSpace:"nowrap"}}>{t.collapseAll}</button>
                </>
              )}
            </div>
            {filtered.length===0&&<div style={{color:th.textMuted,textAlign:"center",padding:48}}>{t.nenhumaEncontrada}</div>}
            {!state.groupByMonth?(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {sorted.map(o=><OSCard key={o.id} o={o} dispatch={dispatch} t={t} th={th} B={B} state={state} exportPDF={exportPDF} fmtDate={fmtDate} onConfirmDelete={showConfirm}/>)}
              </div>
            ):(
              <div>
                {years.map(year=>{
                  const mKeys=yMap[year];
                  const anyExpanded=mKeys.some(k=>state.expandedGroups[k]);
                  const yTotal=mKeys.reduce((s,k)=>s+gMap[k].length,0);
                  return(
                    <div key={year} style={{marginBottom:20}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer",userSelect:"none"}}
                        onClick={()=>dispatch({type:anyExpanded?"COLLAPSE_ALL":"EXPAND_ALL",keys:mKeys})}>
                        <div style={{flex:1,height:2,background:`linear-gradient(to right,${th.accent},transparent)`}}/>
                        <span style={{fontWeight:800,fontSize:17,color:th.accent,letterSpacing:1}}>📅 {year}</span>
                        <span style={{fontSize:11,color:th.textMuted,background:th.surface2,padding:"2px 9px",borderRadius:99,border:`1px solid ${th.border2}`}}>{yTotal} OS</span>
                        <span style={{color:th.accent,fontSize:13}}>{anyExpanded?"▲":"▼"}</span>
                        <div style={{flex:1,height:2,background:`linear-gradient(to left,${th.accent},transparent)`}}/>
                      </div>
                      {mKeys.map(key=>{
                        const [yr,mo]=key.split("-");
                        const mName=new Date(parseInt(yr),parseInt(mo)-1,1).toLocaleDateString(state.lang==="en"?"en-US":state.lang==="es"?"es-ES":"pt-BR",{month:"long"});
                        const items=gMap[key];
                        const exp=!!state.expandedGroups[key];
                        const nc=items.reduce((s,o)=>s+(parseInt(o.totalNaoConformidades)||o.naoConformidades.length),0);
                        const conf=items.filter(o=>o.status==="conforme").length;
                        return(
                          <div key={key} style={{marginBottom:8}}>
                            <div onClick={()=>dispatch({type:"TOGGLE_EXPAND",key})}
                              style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderRadius:10,background:exp?th.surface:th.surface2,border:`1px solid ${exp?th.accent:th.border2}`,cursor:"pointer",userSelect:"none",transition:"border-color 0.15s"}}>
                              <span style={{color:th.accent,fontSize:14,fontWeight:700}}>{exp?"▾":"▸"}</span>
                              <span style={{fontWeight:700,color:exp?th.accent:th.text,fontSize:14,minWidth:130,textTransform:"capitalize"}}>{mName} {yr}</span>
                              <span style={{fontSize:11,color:th.textMuted,background:th.bg,padding:"2px 8px",borderRadius:99,border:`1px solid ${th.border2}`}}>{items.length} OS</span>
                              <span style={{fontSize:11,color:"#22c55e",background:"#14532d",padding:"2px 7px",borderRadius:99}}>{conf} ✅</span>
                              {items.length-conf>0&&<span style={{fontSize:11,color:"#ef4444",background:"#450a0a",padding:"2px 7px",borderRadius:99}}>{items.length-conf} ⚠️</span>}
                              {nc>0&&<span style={{fontSize:11,color:"#f97316",marginLeft:"auto"}}>{nc} NC</span>}
                            </div>
                            {exp&&(
                              <div style={{paddingLeft:12,borderLeft:`2px solid ${th.accent}44`,marginTop:6,display:"flex",flexDirection:"column",gap:8}}>
                                {items.map(o=><OSCard key={o.id} o={o} dispatch={dispatch} t={t} th={th} B={B} state={state} exportPDF={exportPDF} fmtDate={fmtDate} onConfirmDelete={showConfirm}/>)}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {/* TRACKER - ACOMPANHAMENTO DE OS */}
      {state.view==="tracker"&&(()=>{
        const hoje=new Date();hoje.setHours(0,0,0,0);
        const PRAZO=15;
        const diasDecorridos=(entrada)=>Math.ceil((hoje-new Date(entrada+"T00:00:00"))/(1000*60*60*24));
        const vencida=(item)=>item.situacao!=="finalizada"&&item.situacao!=="ag_inspecao"&&item.situacao!=="liberada"&&diasDecorridos(item.dataEntrada)>PRAZO;
        const quaseVence=(item)=>{const d=diasDecorridos(item.dataEntrada);return item.situacao!=="finalizada"&&item.situacao!=="ag_inspecao"&&item.situacao!=="liberada"&&d>=12&&d<=PRAZO;};

        // ── EXTERNO helpers ──
        const extVencida=(item)=>{
          if(item.situacao==="retornada"||!item.dataRetornoPrev)return false;
          return new Date(item.dataRetornoPrev+"T00:00:00")<hoje;
        };
        const extQuaseVence=(item)=>{
          if(item.situacao==="retornada"||!item.dataRetornoPrev)return false;
          const diff=Math.ceil((new Date(item.dataRetornoPrev+"T00:00:00")-hoje)/(1000*60*60*24));
          return diff>=0&&diff<=3;
        };

        const aguardando=state.tracker.filter(x=>x.situacao==="aguardando");
        const emManutencao=state.tracker.filter(x=>x.situacao==="manutencao");
        const finalizada=state.tracker.filter(x=>x.situacao==="finalizada");
        const agInspecao=state.tracker.filter(x=>x.situacao==="ag_inspecao");
        const liberada=state.tracker.filter(x=>x.situacao==="liberada");
        const totalVencidas=state.tracker.filter(vencida).length;

        const extAguardEnvio=state.externo.filter(x=>x.situacao==="aguardando_envio");
        const extEnviadas=state.externo.filter(x=>x.situacao==="enviada");
        const extRetornadas=state.externo.filter(x=>x.situacao==="retornada");
        const extVencidas=state.externo.filter(extVencida).length;

        // ── Badges ──
        const isLight=state.theme==="light";
        const SitBadge=({s})=>{
          const cfg={
            aguardando:{darkBg:"#1e3a5f",lightBg:"#dbeafe",darkC:"#7dd3fc",lightC:"#1d4ed8",label:"⏳ Aguardando Manutenção"},
            manutencao:{darkBg:"#422006",lightBg:"#ffedd5",darkC:"#fb923c",lightC:"#c2410c",label:"🔧 Em Manutenção"},
            finalizada:{darkBg:"#14532d",lightBg:"#dcfce7",darkC:"#86efac",lightC:"#15803d",label:"✅ Finalizada – Ag. Coleta"},
            ag_inspecao:{darkBg:"#4c1d95",lightBg:"#ede9fe",darkC:"#c084fc",lightC:"#7c3aed",label:"🔍 Aguardando Inspeção"},
            liberada:{darkBg:"#064e3b",lightBg:"#d1fae5",darkC:"#34d399",lightC:"#059669",label:"🟢 Liberada"},
          };
          const k=cfg[s]||cfg.aguardando;
          return <span style={{fontSize:11,padding:"3px 10px",borderRadius:99,background:isLight?k.lightBg:k.darkBg,color:isLight?k.lightC:k.darkC,fontWeight:700,whiteSpace:"nowrap",border:`1px solid ${isLight?k.lightC+"44":k.darkC+"44"}`}}>{k.label}</span>;
        };
        const ExtBadge=({s})=>{
          const cfg={
            aguardando_envio:{darkBg:"#1e3a5f",lightBg:"#dbeafe",darkC:"#7dd3fc",lightC:"#1d4ed8",label:"📦 Aguardando Envio"},
            enviada:{darkBg:"#422006",lightBg:"#ffedd5",darkC:"#fb923c",lightC:"#c2410c",label:"🚚 Enviada"},
            retornada:{darkBg:"#14532d",lightBg:"#dcfce7",darkC:"#86efac",lightC:"#15803d",label:"✅ Retornada"},
          };
          const k=cfg[s]||cfg.aguardando_envio;
          return <span style={{fontSize:11,padding:"3px 10px",borderRadius:99,background:isLight?k.lightBg:k.darkBg,color:isLight?k.lightC:k.darkC,fontWeight:700,whiteSpace:"nowrap",border:`1px solid ${isLight?k.lightC+"44":k.darkC+"44"}`}}>{k.label}</span>;
        };

        // ── ColHeader ──
        const ColHeader=({icon,title,count,darkColor,lightColor,darkBg,lightBg})=>{
          const color=isLight?lightColor:darkColor;
          const bg=isLight?lightBg:darkBg;
          return(
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 14px",borderRadius:10,background:bg,border:`1px solid ${isLight?lightColor+"55":darkColor+"55"}`,marginBottom:10}}>
              <span style={{fontSize:16}}>{icon}</span>
              <span style={{fontWeight:700,color,fontSize:13}}>{title}</span>
              <span style={{marginLeft:"auto",fontSize:12,color,background:isLight?"rgba(0,0,0,0.06)":"rgba(0,0,0,0.25)",padding:"2px 9px",borderRadius:99,fontWeight:700}}>{count}</span>
            </div>
          );
        };

        // ── Card interno ──
        const TrackerCard=({item})=>{
          const dias=diasDecorridos(item.dataEntrada);
          const atrasada=vencida(item);
          const quase=quaseVence(item);
          return(
            <div style={{background:th.surface,borderRadius:12,padding:"13px 16px",border:`2px solid ${atrasada?"#dc2626":quase?"#f59e0b":th.border}`,position:"relative"}}>
              {atrasada&&<div style={{position:"absolute",top:-1,right:10,background:"#dc2626",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 9px",borderRadius:"0 0 7px 7px",letterSpacing:0.5}}>🚨 PRAZO VENCIDO</div>}
              {quase&&!atrasada&&<div style={{position:"absolute",top:-1,right:10,background:"#f59e0b",color:"#000",fontSize:9,fontWeight:700,padding:"2px 9px",borderRadius:"0 0 7px 7px",letterSpacing:0.5}}>⚠️ VENCE EM BREVE</div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:140}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,color:th.accent,fontSize:14}}>{item.cliente||"—"}</span>
                    {item.numOs&&<span style={{fontSize:11,color:th.textMuted}}>OS #{item.numOs}</span>}
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                    <SitBadge s={item.situacao}/>
                    {item.situacao!=="finalizada"&&item.situacao!=="ag_inspecao"&&item.situacao!=="liberada"&&(
                      <span style={{fontSize:11,color:atrasada?"#f87171":quase?"#fbbf24":th.textMuted}}>
                        {fmtDate(item.dataEntrada,"pt")} · {atrasada?`${dias-PRAZO}d atrasado`:`${Math.max(0,PRAZO-dias)}d restantes`}
                      </span>
                    )}
                    {(item.situacao==="finalizada"||item.situacao==="ag_inspecao"||item.situacao==="liberada")&&<span style={{fontSize:11,color:th.textMuted}}>{fmtDate(item.dataEntrada,"pt")}</span>}
                  </div>
                  {item.obs&&<div style={{fontSize:11,color:th.textSub,fontStyle:"italic",marginTop:2}}>"{item.obs}"</div>}
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {item.situacao==="aguardando"&&<button onClick={()=>dispatch({type:"UPDATE_TRACKER_STATUS",id:item.id,situacao:"manutencao"})} style={{...B(isLight?"#ffedd5":"#422006",isLight?"#c2410c":"#fb923c"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#c2410c44":"transparent"}`}}>→ Manutenção</button>}
                  {item.situacao==="manutencao"&&<button onClick={()=>dispatch({type:"UPDATE_TRACKER_STATUS",id:item.id,situacao:"finalizada"})} style={{...B(isLight?"#dcfce7":"#14532d",isLight?"#15803d":"#86efac"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#15803d44":"transparent"}`}}>→ Finalizada</button>}
                  {item.situacao==="finalizada"&&<button onClick={()=>dispatch({type:"UPDATE_TRACKER_STATUS",id:item.id,situacao:"ag_inspecao"})} style={{...B(isLight?"#ede9fe":"#4c1d95",isLight?"#7c3aed":"#c084fc"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#7c3aed44":"transparent"}`}}>→ Ag. Inspeção</button>}
                  {item.situacao==="ag_inspecao"&&<button onClick={()=>dispatch({type:"UPDATE_TRACKER_STATUS",id:item.id,situacao:"liberada"})} style={{...B(isLight?"#d1fae5":"#064e3b",isLight?"#059669":"#34d399"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#05966944":"transparent"}`}}>→ Liberada</button>}
                  {item.situacao==="liberada"&&<button onClick={()=>dispatch({type:"UPDATE_TRACKER_STATUS",id:item.id,situacao:"aguardando"})} style={{...B(isLight?"#dbeafe":"#1e3a5f",isLight?"#1d4ed8":"#7dd3fc"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#1d4ed844":"transparent"}`}}>↺ Reabrir</button>}
                  <button onClick={()=>dispatch({type:"OPEN_TRACKER_MODAL",payload:{...item}})} style={{...B(isLight?"#fff3e8":"#7a3800",isLight?"#c2410c":"#F47B20"),fontSize:10,padding:"4px 8px",border:`1px solid ${isLight?"#F47B2044":"transparent"}`}}>✏️</button>
                  <button onClick={()=>{if(window.confirm("Excluir?"))dispatch({type:"DELETE_TRACKER",payload:item.id})}} style={{...B(isLight?"#fee2e2":"#7f1d1d",isLight?"#dc2626":"#fca5a5"),fontSize:10,padding:"4px 8px",border:`1px solid ${isLight?"#dc262644":"transparent"}`}}>✕</button>
                </div>
              </div>
              {item.situacao!=="finalizada"&&item.situacao!=="ag_inspecao"&&item.situacao!=="liberada"&&(
                <div style={{marginTop:8}}>
                  <div style={{background:th.bg,borderRadius:99,height:4,overflow:"hidden"}}>
                    <div style={{width:Math.min(100,(dias/PRAZO)*100)+"%",height:"100%",background:atrasada?"#dc2626":quase?"#f59e0b":"#22c55e",borderRadius:99}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                    <span style={{fontSize:8,color:th.textMuted}}>Dia 0</span>
                    <span style={{fontSize:8,color:atrasada?"#f87171":th.textMuted}}>Prazo: {PRAZO}d</span>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // ── Card externo ──
        const ExternoCard=({item})=>{
          const atrasada=extVencida(item);
          const quase=extQuaseVence(item);
          const diffDias=item.dataRetornoPrev&&item.situacao!=="retornada"
            ?Math.ceil((new Date(item.dataRetornoPrev+"T00:00:00")-hoje)/(1000*60*60*24))
            :null;
          return(
            <div style={{background:th.surface,borderRadius:12,padding:"13px 16px",border:`2px solid ${atrasada?"#dc2626":quase?"#f59e0b":th.border}`,position:"relative"}}>
              {atrasada&&<div style={{position:"absolute",top:-1,right:10,background:"#dc2626",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 9px",borderRadius:"0 0 7px 7px",letterSpacing:0.5}}>🚨 RETORNO ATRASADO</div>}
              {quase&&!atrasada&&<div style={{position:"absolute",top:-1,right:10,background:"#f59e0b",color:"#000",fontSize:9,fontWeight:700,padding:"2px 9px",borderRadius:"0 0 7px 7px",letterSpacing:0.5}}>⚠️ RETORNO PRÓXIMO</div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:140}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,color:isLight?"#7c3aed":"#c084fc",fontSize:14}}>{item.cliente||"—"}</span>
                    {item.numOs&&<span style={{fontSize:11,color:th.textMuted}}>OS #{item.numOs}</span>}
                  </div>
                  {item.tipoServico&&<div style={{fontSize:12,color:isLight?"#7c3aed":"#a78bfa",fontWeight:600,marginBottom:4}}>🏭 {item.tipoServico}{item.prestador?` · ${item.prestador}`:""}</div>}
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                    <ExtBadge s={item.situacao}/>
                    {item.situacao!=="aguardando_envio"&&<span style={{fontSize:11,color:th.textMuted}}>Envio: {fmtDate(item.dataEnvio,"pt")}</span>}
                    {item.dataRetornoPrev&&item.situacao!=="retornada"&&(
                      <span style={{fontSize:11,color:atrasada?"#f87171":quase?"#fbbf24":th.textMuted}}>
                        Prev. retorno: {fmtDate(item.dataRetornoPrev,"pt")}
                        {diffDias!==null&&(atrasada?` · ${Math.abs(diffDias)}d atrasado`:(diffDias===0?" · Hoje":(` · ${diffDias}d`)))}
                      </span>
                    )}
                    {item.situacao==="retornada"&&item.dataRetorno&&<span style={{fontSize:11,color:isLight?"#15803d":"#86efac",fontWeight:600}}>Retornou: {fmtDate(item.dataRetorno,"pt")}</span>}
                  </div>
                  {item.obs&&<div style={{fontSize:11,color:th.textSub,fontStyle:"italic",marginTop:2}}>"{item.obs}"</div>}
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {item.situacao==="aguardando_envio"&&<button onClick={()=>dispatch({type:"UPDATE_EXTERNO_STATUS",id:item.id,situacao:"enviada"})} style={{...B(isLight?"#ffedd5":"#422006",isLight?"#c2410c":"#fb923c"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#c2410c44":"transparent"}`}}>→ Enviada</button>}
                  {item.situacao==="enviada"&&<button onClick={()=>dispatch({type:"UPDATE_EXTERNO_STATUS",id:item.id,situacao:"retornada",dataRetorno:new Date().toISOString().slice(0,10)})} style={{...B(isLight?"#dcfce7":"#14532d",isLight?"#15803d":"#86efac"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#15803d44":"transparent"}`}}>→ Retornada</button>}
                  {item.situacao==="retornada"&&<button onClick={()=>dispatch({type:"UPDATE_EXTERNO_STATUS",id:item.id,situacao:"aguardando_envio"})} style={{...B(isLight?"#dbeafe":"#1e3a5f",isLight?"#1d4ed8":"#7dd3fc"),fontSize:10,padding:"4px 8px",whiteSpace:"nowrap",border:`1px solid ${isLight?"#1d4ed844":"transparent"}`}}>↺ Reabrir</button>}
                  <button onClick={()=>dispatch({type:"OPEN_EXTERNO_MODAL",payload:{...item}})} style={{...B(isLight?"#fff3e8":"#7a3800",isLight?"#c2410c":"#F47B20"),fontSize:10,padding:"4px 8px",border:`1px solid ${isLight?"#F47B2044":"transparent"}`}}>✏️</button>
                  <button onClick={()=>{if(window.confirm("Excluir?"))dispatch({type:"DELETE_EXTERNO",payload:item.id})}} style={{...B(isLight?"#fee2e2":"#7f1d1d",isLight?"#dc2626":"#fca5a5"),fontSize:10,padding:"4px 8px",border:`1px solid ${isLight?"#dc262644":"transparent"}`}}>✕</button>
                </div>
              </div>
            </div>
          );
        };

        const tab=state.trackerTab||"interno";

        return(
          <div>
            {/* Page header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:th.text}}>🔧 Acompanhamento de OS</div>
                <div style={{fontSize:12,color:th.textMuted,marginTop:2}}>Prazo interno: {PRAZO} dias &nbsp;·&nbsp; {state.tracker.length} internas &nbsp;·&nbsp; {state.externo.length} externas</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                {(totalVencidas>0||extVencidas>0)&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,background:"#450a0a",border:"1px solid #dc2626",borderRadius:8,padding:"5px 12px"}}>
                    <span>🚨</span>
                    <span style={{color:"#f87171",fontWeight:700,fontSize:12}}>{totalVencidas+extVencidas} vencida{totalVencidas+extVencidas>1?"s":""}</span>
                  </div>
                )}
                <button
                  onClick={()=>tab==="interno"?dispatch({type:"OPEN_TRACKER_MODAL",payload:null}):dispatch({type:"OPEN_EXTERNO_MODAL",payload:null})}
                  style={{padding:"9px 18px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#0ea5e9,#38bdf8)",color:state.theme==="dark"?"#0f172a":"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  + {tab==="interno"?"Nova OS Interna":"Nova OS Externa"}
                </button>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:0,marginBottom:20,background:th.surface2,borderRadius:12,padding:4,border:`1px solid ${th.border2}`,width:"fit-content"}}>
              {[["interno","🔧 Manutenção Interna",totalVencidas],["externo","🏭 Serviço Externo",extVencidas]].map(([v,label,venc])=>(
                <button key={v} onClick={()=>dispatch({type:"SET_TRACKER_TAB",payload:v})}
                  style={{padding:"9px 20px",borderRadius:9,border:"none",background:tab===v?(state.theme==="dark"?th.accent:"#0ea5e9"):"transparent",color:tab===v?(state.theme==="dark"?"#0f172a":"#fff"):th.textSub,fontWeight:tab===v?700:400,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.15s",whiteSpace:"nowrap"}}>
                  {label}
                  {venc>0&&<span style={{fontSize:10,background:"#dc2626",color:"#fff",padding:"1px 6px",borderRadius:99,fontWeight:700}}>{venc}</span>}
                </button>
              ))}
            </div>

            {/* ── TAB INTERNO ── */}
            {tab==="interno"&&(
              <div>
                {/* KPIs */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}}>
                  {[
                    ["⏳","Aguardando",aguardando.length,isLight?"#1d4ed8":"#7dd3fc",isLight?"#dbeafe":"#1e3a5f44",isLight?"#1d4ed833":"#1e3a5f"],
                    ["🔧","Em Manutenção",emManutencao.length,isLight?"#c2410c":"#fb923c",isLight?"#ffedd5":"#42200644",isLight?"#c2410c33":"#422006"],
                    ["🔍","Ag. Inspeção",agInspecao.length,isLight?"#7c3aed":"#c084fc",isLight?"#ede9fe":"#4c1d9544",isLight?"#7c3aed33":"#4c1d95"],
                    ["✅","Finalizadas",finalizada.length,isLight?"#15803d":"#86efac",isLight?"#dcfce7":"#14532d44",isLight?"#15803d33":"#14532d"],
                    ["🟢","Liberadas",liberada.length,isLight?"#059669":"#34d399",isLight?"#d1fae5":"#064e3b44",isLight?"#05966933":"#064e3b"],
                    ["🚨","Vencidas",totalVencidas,isLight?"#dc2626":"#f87171",isLight?"#fee2e2":"#450a0a44",isLight?"#dc262633":"#450a0a"],
                  ].map(([icon,label,val,color,bg,border])=>(
                    <div key={label} style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${border}`,textAlign:"center"}}>
                      <div style={{fontSize:20}}>{icon}</div>
                      <div style={{fontSize:22,fontWeight:800,color,marginTop:3}}>{val}</div>
                      <div style={{fontSize:10,color,opacity:isLight?1:0.8,marginTop:1,fontWeight:600}}>{label}</div>
                    </div>
                  ))}
                </div>

                {state.tracker.length===0&&(
                  <div style={{...C,textAlign:"center",padding:"40px 24px",color:th.textMuted}}>
                    <div style={{fontSize:36,marginBottom:10}}>🔧</div>
                    <div style={{fontWeight:600,marginBottom:4}}>Nenhuma OS interna</div>
                    <div style={{fontSize:13}}>Clique em "+ Nova OS Interna" para começar</div>
                  </div>
                )}

                {state.tracker.length>0&&(()=>{
                  // ── Build client groups for ALL statuses ──
                  const allClientes=[...new Set(state.tracker.map(x=>x.cliente||"Sem cliente"))].sort((a,b)=>a.localeCompare(b,"pt-BR"));

                  // Sort each status list by entry date
                  const sortAsc=(arr)=>[...arr].sort((a,b)=>new Date(a.dataEntrada)-new Date(b.dataEntrada));
                  const sortDesc=(arr)=>[...arr].sort((a,b)=>new Date(b.dataEntrada)-new Date(a.dataEntrada));

                  return(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,alignItems:"start"}}>

                      {/* COL 1 – AGUARDANDO */}
                      <div>
                        <ColHeader icon="⏳" title="Aguardando Manutenção" count={aguardando.length} darkColor="#7dd3fc" lightColor="#1d4ed8" darkBg="#1e3a5f33" lightBg="#dbeafe"/>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {aguardando.length===0&&<div style={{color:th.textMuted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Nenhuma</div>}
                          {sortAsc(aguardando).map(item=><TrackerCard key={item.id} item={item}/>)}
                        </div>
                      </div>

                      {/* COL 2 – EM MANUTENÇÃO grouped by client */}
                      <div>
                        <ColHeader icon="🔧" title="Em Manutenção" count={emManutencao.length} darkColor="#fb923c" lightColor="#c2410c" darkBg="#42200633" lightBg="#ffedd5"/>
                        {emManutencao.length===0&&<div style={{color:th.textMuted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Nenhuma</div>}
                        {allClientes.filter(c=>emManutencao.some(x=>(x.cliente||"Sem cliente")===c)).map(cliente=>{
                          const items=sortAsc(emManutencao.filter(x=>(x.cliente||"Sem cliente")===cliente));
                          const hasVencida=items.some(vencida);
                          const hasQuase=items.some(quaseVence);
                          return(
                            <div key={cliente} style={{marginBottom:12}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,background:hasVencida?"#450a0a44":hasQuase?"#42200644":th.surface2,border:`1px solid ${hasVencida?"#dc262666":hasQuase?"#f59e0b66":th.border2}`,marginBottom:6}}>
                                <span style={{fontSize:13}}>👤</span>
                                <span style={{fontWeight:700,color:hasVencida?"#f87171":hasQuase?"#fbbf24":th.text,fontSize:13,flex:1}}>{cliente}</span>
                                <span style={{fontSize:11,color:th.textMuted,background:th.bg,padding:"1px 8px",borderRadius:99,border:`1px solid ${th.border2}`,fontWeight:600}}>{items.length} OS</span>
                                {hasVencida&&<span style={{fontSize:10,color:"#f87171",fontWeight:700}}>🚨</span>}
                                {hasQuase&&!hasVencida&&<span style={{fontSize:10,color:"#fbbf24",fontWeight:700}}>⚠️</span>}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:6,paddingLeft:10,borderLeft:`2px solid #fb923c66`}}>
                                {items.map(item=><TrackerCard key={item.id} item={item}/>)}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* COL 3 – AGUARDANDO INSPEÇÃO grouped by client */}
                      <div>
                        <ColHeader icon="🔍" title="Aguardando Inspeção" count={agInspecao.length} darkColor="#c084fc" lightColor="#7c3aed" darkBg="#4c1d9533" lightBg="#ede9fe"/>
                        {agInspecao.length===0&&<div style={{color:th.textMuted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Nenhuma</div>}
                        {allClientes.filter(c=>agInspecao.some(x=>(x.cliente||"Sem cliente")===c)).map(cliente=>{
                          const items=sortDesc(agInspecao.filter(x=>(x.cliente||"Sem cliente")===cliente));
                          return(
                            <div key={cliente} style={{marginBottom:12}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,background:th.surface2,border:`1px solid ${th.border2}`,marginBottom:6}}>
                                <span style={{fontSize:13}}>👤</span>
                                <span style={{fontWeight:700,color:th.text,fontSize:13,flex:1}}>{cliente}</span>
                                <span style={{fontSize:11,color:th.textMuted,background:th.bg,padding:"1px 8px",borderRadius:99,border:`1px solid ${th.border2}`,fontWeight:600}}>{items.length} OS</span>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:6,paddingLeft:10,borderLeft:"2px solid #c084fc66"}}>
                                {items.map(item=><TrackerCard key={item.id} item={item}/>)}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* COL 4 – FINALIZADA grouped by client */}
                      <div>
                        <ColHeader icon="✅" title="Finalizada – Ag. Coleta" count={finalizada.length} darkColor="#86efac" lightColor="#15803d" darkBg="#14532d33" lightBg="#dcfce7"/>
                        {finalizada.length===0&&<div style={{color:th.textMuted,fontSize:12,textAlign:"center",padding:"16px 0"}}>Nenhuma</div>}
                        {allClientes.filter(c=>finalizada.some(x=>(x.cliente||"Sem cliente")===c)).map(cliente=>{
                          const items=sortDesc(finalizada.filter(x=>(x.cliente||"Sem cliente")===cliente));
                          return(
                            <div key={cliente} style={{marginBottom:12}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,background:th.surface2,border:`1px solid ${th.border2}`,marginBottom:6}}>
                                <span style={{fontSize:13}}>👤</span>
                                <span style={{fontWeight:700,color:th.text,fontSize:13,flex:1}}>{cliente}</span>
                                <span style={{fontSize:11,color:th.textMuted,background:th.bg,padding:"1px 8px",borderRadius:99,border:`1px solid ${th.border2}`,fontWeight:600}}>{items.length} OS</span>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:6,paddingLeft:10,borderLeft:"2px solid #86efac66"}}>
                                {items.map(item=><TrackerCard key={item.id} item={item}/>)}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* COL 5 – LIBERADA grouped by client */}
                      <div>
                        <ColHeader icon="🟢" title="Liberada" count={liberada.length} darkColor="#34d399" lightColor="#059669" darkBg="#064e3b33" lightBg="#d1fae5"/>

          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
            <button onClick={saveToGoogleDrive} style={{padding:"16px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1a73e8,#34a4f4)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              <span style={{fontSize:24}}>🟦</span>
              <div style={{textAlign:"left"}}>
                <div>Google Drive</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.85}}>{state.lang==="en"?"Download + open Drive":state.lang==="es"?"Descargar + abrir Drive":"Baixar + abrir Drive"}</div>
              </div>
            </button>
            <button onClick={saveToOneDrive} style={{padding:"16px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0078d4,#38a3f1)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              <span style={{fontSize:24}}>🟦</span>
              <div style={{textAlign:"left"}}>
                <div>Microsoft OneDrive</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.85}}>{state.lang==="en"?"Download + open OneDrive":state.lang==="es"?"Descargar + abrir OneDrive":"Baixar + abrir OneDrive"}</div>
              </div>
            </button>
          </div>
          <button onClick={()=>dispatch({type:"CLOSE_CLOUD_MODAL"})} style={{width:"100%",padding:10,borderRadius:10,border:`1px solid ${th.border2}`,background:"transparent",color:th.textSub,cursor:"pointer"}}>{t.cancelar}</button>
        </div>
      </div>
    )}

    {/* TOAST */}
    {state.toast&&(
      <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
        background:state.toast.startsWith("✅")||state.toast.startsWith("📊")?"#1A3A2A":state.toast.startsWith("❌")?"#3A1A1A":"#2E2E2E",
        color:state.toast.startsWith("✅")||state.toast.startsWith("📊")?"#34d399":state.toast.startsWith("❌")?"#fca5a5":"#F5F5F5",
        padding:"12px 26px",borderRadius:10,fontWeight:600,fontSize:14,
        boxShadow:"0 8px 30px rgba(0,0,0,0.45)",zIndex:2000,whiteSpace:"nowrap",
        border:`1px solid ${state.toast.startsWith("✅")||state.toast.startsWith("📊")?"#34d39944":state.toast.startsWith("❌")?"#f8717144":"#484848"}`}}>
        {state.toast}
      </div>
    )}

    {/* RELATÓRIO MENSAL MODAL */}
    {state.relModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
        <div style={{background:th.surface,borderRadius:16,padding:30,width:460,maxWidth:"95vw",border:`1px solid ${th.border}`,boxShadow:"0 24px 60px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:18,fontWeight:700,color:th.accent,marginBottom:6}}>📋 {state.lang==="en"?"Monthly Report":state.lang==="es"?"Reporte Mensual":"Relatório Mensal"}</div>
          <div style={{fontSize:13,color:th.textMuted,marginBottom:20}}>{state.lang==="en"?"Select period and optionally send by email":state.lang==="es"?"Seleccione el período":"Selecione o período e envie por e-mail opcionalmente"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            <div>
              <label style={L}>{state.lang==="en"?"Month":state.lang==="es"?"Mes":"Mês"}</label>
              <select value={state.relMes} onChange={e=>dispatch({type:"SET_REL",field:"relMes",value:parseInt(e.target.value)})} style={I()}>
                {Array.from({length:12},(_,i)=>(
                  <option key={i+1} value={i+1}>{new Date(2000,i,1).toLocaleDateString(state.lang==="en"?"en-US":state.lang==="es"?"es-ES":"pt-BR",{month:"long"})}</option>
                ))}
              </select>
            </div>
            <div>
              <label style={L}>{state.lang==="en"?"Year":state.lang==="es"?"Año":"Ano"}</label>
              <select value={state.relAno} onChange={e=>dispatch({type:"SET_REL",field:"relAno",value:parseInt(e.target.value)})} style={I()}>
                {Array.from({length:5},(_,i)=>new Date().getFullYear()-i).map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </div>
          {(()=>{
            const osM=state.osList.filter(o=>{const d=new Date(o.createdAt);return d.getMonth()+1===state.relMes&&d.getFullYear()===state.relAno;});
            const tIt=osM.reduce((a,o)=>a+(parseInt(o.quantidadeTotal)||0),0);
            const tNC=osM.reduce((a,o)=>a+o.naoConformidades.length,0);
            const tConf=osM.filter(o=>o.status==="conforme").length;
            const taxa2=osM.length>0?Math.round((tConf/osM.length)*100):0;
            return(
              <div style={{background:th.surface2,borderRadius:10,padding:14,marginBottom:16,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,textAlign:"center"}}>
                {[["OS",osM.length,th.accent],["Itens",tIt,"#a78bfa"],["NCs",tNC,"#ef4444"],["Taxa",taxa2+"%",taxa2>=80?"#22c55e":taxa2>=50?"#f59e0b":"#ef4444"]].map(([l,v,c])=>(
                  <div key={l}><div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:th.textMuted}}>{l}</div></div>
                ))}
              </div>
            );
          })()}
          <div style={{marginBottom:20}}>
            <label style={L}>{state.lang==="en"?"Send to email (optional)":state.lang==="es"?"Enviar a email (opcional)":"Enviar por e-mail (opcional)"}</label>
            <input type="email" placeholder={t.emailPlaceholder} value={state.relEmail} onChange={e=>dispatch({type:"SET_REL",field:"relEmail",value:e.target.value})} style={I()}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleRelatorio} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"linear-gradient(135deg,#7c3aed,#a78bfa)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
              📋 {state.lang==="en"?"Generate PDF":state.lang==="es"?"Generar PDF":"Gerar PDF"}{state.relEmail?" & Enviar":""}
            </button>
            <button onClick={()=>dispatch({type:"CLOSE_REL"})} style={{padding:"12px 18px",borderRadius:10,border:`1px solid ${th.border2}`,background:"transparent",color:th.textSub,cursor:"pointer"}}>{t.cancelar}</button>
          </div>
        </div>
      </div>
    )}

    {/* EMAIL MODAL */}
    {state.emailModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
        <div style={{background:th.surface,borderRadius:16,padding:30,width:440,maxWidth:"95vw",border:`1px solid ${th.border}`,boxShadow:"0 24px 60px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:17,fontWeight:700,color:th.accent,marginBottom:5}}>{t.emailTitle}</div>
          <div style={{fontSize:13,color:th.textMuted,marginBottom:18}}>OS #{state.emailModal.os.os} – {state.emailModal.os.cliente||"—"}</div>
          <div style={{background:th.surface2,borderRadius:10,padding:14,marginBottom:18,fontSize:13,color:th.textSub,lineHeight:1.7}}>
            <div style={{color:"#fbbf24",fontWeight:600,marginBottom:6}}>{t.comoFunciona}</div>
            {t.passo1}<br/>{t.passo2}<br/>{t.passo3}
          </div>
          <label style={L}>{t.emailDest}</label>
          <input type="email" placeholder={t.emailPlaceholder} value={state.emailModal.email} onChange={e=>dispatch({type:"SET_EMAIL",payload:e.target.value})} onKeyDown={e=>e.key==="Enter"&&sendEmail()} style={{...I(),marginBottom:18}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={sendEmail} style={{flex:1,padding:11,borderRadius:10,border:"none",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{t.enviar}</button>
            <button onClick={()=>dispatch({type:"CLOSE_EMAIL"})} style={{padding:"11px 18px",borderRadius:10,border:`1px solid ${th.border2}`,background:"transparent",color:th.textSub,cursor:"pointer"}}>{t.cancelar}</button>
          </div>
        </div>
      </div>
    )}

    {/* SETTINGS MODAL */}
    {state.settingsOpen&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,overflowY:"auto",padding:"20px 0"}}>
        <div style={{background:th.surface,borderRadius:16,padding:30,width:480,maxWidth:"95vw",border:`1px solid ${th.border}`,boxShadow:"0 24px 60px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:18,fontWeight:700,color:th.accent,marginBottom:22}}>{t.settings}</div>
          <div style={{marginBottom:20}}>
            <label style={{...L,fontSize:13,fontWeight:600,color:th.text}}>{t.language}</label>
            <div style={{display:"flex",gap:10}}>
              {[["pt","🇧🇷 Português"],["en","🇺🇸 English"],["es","🇪🇸 Español"]].map(([code,name])=>(
                <button key={code} onClick={()=>setTmpLang(code)}
                  style={{flex:1,padding:"10px 8px",borderRadius:10,border:`2px solid ${tmpLang===code?th.accent:th.border2}`,background:tmpLang===code?(state.theme==="dark"?"#0f172a":"#e0f2fe"):th.surface2,color:tmpLang===code?th.accent:th.textSub,cursor:"pointer",fontWeight:tmpLang===code?700:400,fontSize:13}}>
                  {name}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{...L,fontSize:13,fontWeight:600,color:th.text}}>{t.theme}</label>
            <div style={{display:"flex",gap:10}}>
              {[
                ["dark","🌙 Dark","#1A1A1A","#F47B20","Fundo chumbo escuro"],
                ["light","☀️ Light","#F5F5F5","#F47B20","Fundo branco limpo"],
              ].map(([code,name,bg,accent,desc])=>(
                <button key={code} onClick={()=>setTmpTheme(code)}
                  style={{flex:1,padding:"14px 10px",borderRadius:10,border:`2px solid ${tmpTheme===code?"#F47B20":th.border2}`,background:bg,color:code==="dark"?"#F5F5F5":"#1A1A1A",cursor:"pointer",fontWeight:tmpTheme===code?700:400,fontSize:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                  <div style={{width:28,height:28,borderRadius:6,background:"#F47B20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                    {code==="dark"?"🌙":"☀️"}
                  </div>
                  <span style={{fontWeight:700,color:code==="dark"?"#F5F5F5":"#1A1A1A"}}>{code==="dark"?"Dark":"Light"}</span>
                  <span style={{fontSize:10,opacity:0.6,color:code==="dark"?"#F5F5F5":"#1A1A1A"}}>{desc}</span>
                  {tmpTheme===code&&<span style={{fontSize:10,color:"#F47B20",fontWeight:700}}>✓ Ativo</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={L}>{t.emailPadrao}</label>
            <input type="email" placeholder="seuemail@empresa.com" value={tmpEmail} onChange={e=>setTmpEmail(e.target.value)} style={I()}/>
          </div>
          <div style={{marginBottom:22,background:th.surface2,borderRadius:12,padding:18,border:`1px solid ${th.border}`}}>
            <div style={{fontWeight:700,color:th.text,marginBottom:4,fontSize:14}}>{t.dataStorage}</div>
            <div style={{fontSize:12,color:th.textMuted,marginBottom:14,lineHeight:1.6}}>{t.storageInfo}</div>
            <label style={L}>{t.jsonFilename}</label>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
              <input value={tmpFilename} onChange={e=>setTmpFilename(e.target.value)} placeholder={DEFAULT_FILENAME} style={{...I(),flex:1}}/>
              <span style={{color:th.textMuted,fontSize:13,whiteSpace:"nowrap"}}>.json</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div onClick={()=>setTmpAutoSave(!tmpAutoSave)} style={{width:42,height:24,borderRadius:99,background:tmpAutoSave?"#F47B20":th.border2,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                <div style={{position:"absolute",top:3,left:tmpAutoSave?20:3,width:18,height:18,borderRadius:99,background:"#fff",transition:"left 0.2s"}}/>
              </div>
              <span style={{fontSize:13,color:th.textSub,cursor:"pointer"}} onClick={()=>setTmpAutoSave(!tmpAutoSave)}>{t.autoSave}</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>saveJSON(false)} style={{...B("#166534","#86efac"),flex:1,padding:"10px"}}>{t.saveJSON}</button>
              <button onClick={()=>dispatch({type:"OPEN_CLOUD_MODAL"})} style={{...B("#333","#F47B20"),flex:1,padding:"10px"}}>☁️ {state.lang==="en"?"Cloud":state.lang==="es"?"Nube":"Nuvem"}</button>
              <button onClick={()=>FS_SUPPORTED?openViaFSAPI():importRef.current&&importRef.current.click()} style={{...B("#2a2a2a","#AAAAAA"),flex:1,padding:"10px"}}>{t.loadJSON}</button>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>dispatch({type:"SAVE_SETTINGS",lang:tmpLang,theme:tmpTheme,emailPadrao:tmpEmail,jsonFilename:tmpFilename,autoSave:tmpAutoSave})}
              style={{flex:1,padding:12,borderRadius:8,border:"none",background:"linear-gradient(135deg,#F47B20,#FF9A45)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 12px rgba(244,123,32,0.35)"}}>
              {t.saveSettings}
            </button>
            <button onClick={()=>dispatch({type:"TOGGLE_SETTINGS"})} style={{padding:"12px 18px",borderRadius:8,border:`1px solid ${th.border2}`,background:"transparent",color:th.textSub,cursor:"pointer"}}>{t.close}</button>
          </div>
        </div>
      </div>
    )}
    <ConfirmModal msg={state.confirmMsg} th={th} lang={state.lang} onConfirm={()=>{if(confirmCallbackRef.current)confirmCallbackRef.current();confirmCallbackRef.current=null;dispatch({type:"HIDE_CONFIRM"});}} onCancel={()=>{confirmCallbackRef.current=null;dispatch({type:"HIDE_CONFIRM"});}}/>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWrapper/>);
</script>
</body>
</html>
